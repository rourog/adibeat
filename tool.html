<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AdiBeat · Curador JSON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet">
  <style>
    :root {
      --bg-a:#101026; --bg-b:#151842; --bg-c:#24134d;
      --card:rgba(255,255,255,.11); --card2:rgba(255,255,255,.17);
      --line:rgba(255,255,255,.18); --text:#fff; --muted:rgba(255,255,255,.68);
      --hot:#ff6b9d; --blue:#59d6ff; --yellow:#ffe66d; --green:#76f7b1; --danger:#ff6d7a;
      --shadow:0 22px 70px rgba(0,0,0,.34);
      --r-xl:28px; --r-lg:22px; --r-md:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at 12% 0%,rgba(255,107,157,.26),transparent 32%),radial-gradient(circle at 88% 10%,rgba(89,214,255,.22),transparent 34%),radial-gradient(circle at 50% 100%,rgba(118,247,177,.16),transparent 38%),linear-gradient(140deg,var(--bg-a),var(--bg-b) 52%,var(--bg-c));background-attachment:fixed}
    button,input,select,textarea{font:inherit}
    button{border:0;color:var(--text);cursor:pointer;touch-action:manipulation}
    button:disabled{opacity:.45;cursor:not-allowed}
    .material-symbols-rounded{font-family:'Material Symbols Rounded';font-size:1.3em;line-height:1;vertical-align:-.18em;font-variation-settings:'FILL' 0,'wght' 700,'GRAD' 0,'opsz' 24}
    .app{width:min(1180px,100%);min-height:100vh;margin:0 auto;padding:max(16px,env(safe-area-inset-top)) clamp(14px,3vw,28px) max(22px,env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:14px}
    .topbar{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:14px;border-radius:var(--r-xl);background:rgba(8,10,28,.68);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4)}
    h1{margin:0;font-size:clamp(1.5rem,5vw,2.5rem);line-height:.9;letter-spacing:-.07em;font-weight:900;background:linear-gradient(100deg,var(--yellow),var(--hot),var(--blue));-webkit-background-clip:text;background-clip:text;color:transparent}
    .subtitle{margin:6px 0 0;color:var(--muted);font-size:.92rem;line-height:1.25}
    .actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .btn{min-height:44px;padding:0 14px;border-radius:999px;background:rgba(255,255,255,.14);border:1px solid var(--line);display:inline-flex;align-items:center;gap:8px;font-weight:900;box-shadow:0 10px 25px rgba(0,0,0,.18)}
    .btn.primary{background:linear-gradient(135deg,rgba(255,107,157,.96),rgba(89,214,255,.86));color:#101026}.btn.green{background:linear-gradient(135deg,rgba(118,247,177,.96),rgba(89,214,255,.80));color:#101026}.btn.warn{background:linear-gradient(135deg,rgba(255,230,109,.95),rgba(255,107,157,.82));color:#101026}
    .panel{border-radius:var(--r-xl);background:rgba(255,255,255,.10);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(18px) saturate(1.25);-webkit-backdrop-filter:blur(18px) saturate(1.25);overflow:hidden}
    .redirect,.settings,.stats,.toolbar{padding:12px;display:grid;gap:10px}.redirect{grid-template-columns:1fr auto;align-items:center}.settings{grid-template-columns:1fr 1fr auto;align-items:end}.stats{grid-template-columns:repeat(4,minmax(0,1fr))}
    .stat{min-height:72px;padding:14px;border-radius:var(--r-lg);background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;justify-content:center;gap:4px}.label{color:var(--muted);font-size:.74rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em}.value{font-size:clamp(1.25rem,4vw,2rem);font-weight:900;letter-spacing:-.05em}
    .field{display:grid;gap:6px}.field label{color:var(--muted);font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:.04em}
    input,select{width:100%;min-height:46px;border:1px solid var(--line);border-radius:999px;padding:0 15px;color:var(--text);background:rgba(0,0,0,.26);outline:none} input:focus,select:focus{border-color:rgba(89,214,255,.75);box-shadow:0 0 0 4px rgba(89,214,255,.12)}
    .uri-box{min-width:0;padding:12px 14px;border-radius:var(--r-md);background:rgba(0,0,0,.26);border:1px dashed rgba(255,255,255,.22);font-size:.82rem;line-height:1.35;word-break:break-all;color:rgba(255,255,255,.82)}
    .toolbar{grid-template-columns:1fr auto auto}.msg{padding:0 14px 14px;color:var(--muted);font-size:.9rem;line-height:1.35}.msg.ok{color:var(--green)}.msg.err{color:var(--danger)}.msg.warn{color:var(--yellow)}
    .list{display:grid;gap:10px;padding:12px}.empty{padding:24px;text-align:center;color:var(--muted);border:1px dashed rgba(255,255,255,.2);border-radius:var(--r-lg);background:rgba(0,0,0,.14)}
    .track{display:grid;grid-template-columns:60px minmax(0,1fr) minmax(210px,280px);gap:12px;align-items:center;padding:10px;border-radius:var(--r-lg);background:rgba(255,255,255,.105);border:1px solid rgba(255,255,255,.12)}
    .cover{width:60px;height:60px;border-radius:15px;object-fit:cover;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.12)}
    .song{min-width:0}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px}.badge{display:inline-flex;align-items:center;min-height:20px;padding:0 8px;border-radius:999px;font-size:.68rem;font-weight:900;text-transform:uppercase;color:#101026}.badge.red{background:var(--hot)}.badge.blue{background:var(--blue)}
    .title{font-size:1.02rem;font-weight:900;letter-spacing:-.035em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.artist,.album,.tid{margin-top:3px;color:var(--muted);font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tid{font-size:.72rem;color:rgba(255,255,255,.45)}
    .original{display:grid;gap:6px}.original input{border-radius:16px}.original small{color:var(--muted);font-size:.72rem}.output{display:none;margin:0 12px 12px;max-height:360px;overflow:auto;white-space:pre;tab-size:2;padding:14px;border-radius:var(--r-md);background:rgba(0,0,0,.42);border:1px solid rgba(255,255,255,.16);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.78rem;color:rgba(255,255,255,.86)}.output.show{display:block}
    @media (max-width:840px){.topbar,.toolbar,.settings,.redirect{grid-template-columns:1fr}.actions{justify-content:stretch}.actions .btn,.toolbar .btn,.settings .btn{justify-content:center;width:100%}.stats{grid-template-columns:1fr 1fr}.track{grid-template-columns:54px minmax(0,1fr);align-items:start}.cover{width:54px;height:54px}.original{grid-column:1/-1}.toolbar{grid-template-columns:1fr}.list{padding:10px}.subtitle{font-size:.84rem}}
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>AdiBeat Tool</h1>
        <p class="subtitle">Lee playlists de Spotify, captura el artista original y exporta JSON para la tercera pregunta.</p>
      </div>
      <div class="actions">
        <button class="btn primary" id="btn-login"><span class="material-symbols-rounded">account_circle</span>Conectar</button>
        <button class="btn green" id="btn-load" disabled><span class="material-symbols-rounded">sync</span>Leer listas</button>
      </div>
    </header>

    <section class="panel redirect">
      <div>
        <div class="label">Redirect URI exacto</div>
        <div class="uri-box" id="redirect-uri-text"></div>
      </div>
      <button class="btn" id="btn-copy-redirect"><span class="material-symbols-rounded">content_copy</span>Copiar</button>
    </section>

    <section class="panel settings">
      <div class="field">
        <label for="red-id">Playlist Red / Normal</label>
        <input id="red-id" placeholder="URL o ID de playlist" autocomplete="off">
      </div>
      <div class="field">
        <label for="blue-id">Playlist Blue / Covers</label>
        <input id="blue-id" placeholder="URL o ID de playlist" autocomplete="off">
      </div>
      <button class="btn warn" id="btn-save-playlists"><span class="material-symbols-rounded">save</span>Guardar IDs</button>
    </section>

    <section class="panel stats">
      <div class="stat"><div class="label">Total</div><div class="value" id="stat-total">0</div></div>
      <div class="stat"><div class="label">Red</div><div class="value" id="stat-red">0</div></div>
      <div class="stat"><div class="label">Blue</div><div class="value" id="stat-blue">0</div></div>
      <div class="stat"><div class="label">Curadas</div><div class="value" id="stat-filled">0</div></div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input id="search" type="search" placeholder="Buscar canción, artista, álbum o ID…" autocomplete="off">
        <button class="btn" id="btn-preview" disabled><span class="material-symbols-rounded">data_object</span>Vista previa</button>
        <button class="btn green" id="btn-copy" disabled><span class="material-symbols-rounded">content_copy</span>Copiar JSON</button>
        <button class="btn primary" id="btn-download" disabled><span class="material-symbols-rounded">download</span>Descargar JSON</button>
      </div>
      <div class="msg" id="message"></div>
      <pre class="output" id="output-preview"></pre>
      <div class="list" id="track-list"><div class="empty">Conecta Spotify y presiona “Leer listas”.</div></div>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      const CLIENT_ID = 'e848a261a8e7411a8a1138326bd4a18f';
      const REDIRECT_URI_OVERRIDE = '';
      const REDIRECT_URI = REDIRECT_URI_OVERRIDE || cleanRedirectUri(window.location.href);
      const SCOPES = 'playlist-read-private playlist-read-collaborative user-read-private user-read-email';

      const TOKEN_KEY = 'adibeat_tool_token_v2';
      const VERIFIER_KEY = 'adibeat_tool_verifier_v2';
      const CURATION_KEY = 'adibeat_original_artist_curation_v2';
      const PLAYLIST_CONFIG_KEY = 'adibeat_tool_playlist_ids_v1';

      const DEFAULT_PLAYLISTS = {
        red: '00MtRUjzL76Njcqe0mNvsD',
        blue: '3v71SvyMLTBhbpTfAkMizr'
      };

      let accessToken = localStorage.getItem(TOKEN_KEY) || '';
      let tracks = [];
      let curation = readJson(CURATION_KEY, {});
      let playlistConfig = readJson(PLAYLIST_CONFIG_KEY, DEFAULT_PLAYLISTS);
      let previewVisible = false;

      const $ = id => document.getElementById(id);
      const btnLogin = $('btn-login');
      const btnLoad = $('btn-load');
      const btnCopy = $('btn-copy');
      const btnDownload = $('btn-download');
      const btnPreview = $('btn-preview');
      const btnCopyRedirect = $('btn-copy-redirect');
      const btnSavePlaylists = $('btn-save-playlists');
      const redIdInput = $('red-id');
      const blueIdInput = $('blue-id');
      const searchInput = $('search');
      const listEl = $('track-list');
      const messageEl = $('message');
      const outputPreview = $('output-preview');
      const redirectUriText = $('redirect-uri-text');
      const statTotal = $('stat-total');
      const statRed = $('stat-red');
      const statBlue = $('stat-blue');
      const statFilled = $('stat-filled');

      boot();

      function boot() {
        redirectUriText.textContent = REDIRECT_URI;
        redIdInput.value = playlistConfig.red || DEFAULT_PLAYLISTS.red;
        blueIdInput.value = playlistConfig.blue || DEFAULT_PLAYLISTS.blue;
        bindEvents();

        if (window.location.protocol === 'file:') {
          setMessage('Estás usando file://. Si OAuth falla, usa GitHub Pages o un servidor local y registra ese Redirect URI exacto.', 'warn');
        }

        const code = new URLSearchParams(window.location.search).get('code');
        if (code && !accessToken) {
          completeSpotifyLogin(code);
          return;
        }

        updateUi();
        if (accessToken) {
          setMessage('Spotify conectado. Presiona “Leer listas”.', 'ok');
        }
      }

      function bindEvents() {
        btnLogin.addEventListener('click', () => {
          localStorage.removeItem(TOKEN_KEY);
          accessToken = '';
          startSpotifyLogin();
        });
        btnLoad.addEventListener('click', loadPlaylists);
        btnCopyRedirect.addEventListener('click', () => copyText(REDIRECT_URI, 'Redirect URI copiado.'));
        btnSavePlaylists.addEventListener('click', savePlaylistConfig);
        btnCopy.addEventListener('click', () => copyText(buildJsonText(), 'JSON copiado.'));
        btnDownload.addEventListener('click', downloadJson);
        btnPreview.addEventListener('click', togglePreview);
        searchInput.addEventListener('input', renderList);
      }

      async function startSpotifyLogin() {
        const codeVerifier = randomString(64);
        localStorage.setItem(VERIFIER_KEY, codeVerifier);
        const codeChallenge = base64UrlEncode(await sha256(codeVerifier));

        const authUrl = new URL('https://accounts.spotify.com/authorize');
        authUrl.search = new URLSearchParams({
          client_id: CLIENT_ID,
          response_type: 'code',
          redirect_uri: REDIRECT_URI,
          scope: SCOPES,
          code_challenge_method: 'S256',
          code_challenge: codeChallenge,
          show_dialog: 'true'
        }).toString();
        window.location.href = authUrl.toString();
      }

      async function completeSpotifyLogin(authCode) {
        try {
          const codeVerifier = localStorage.getItem(VERIFIER_KEY) || '';
          const response = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
              client_id: CLIENT_ID,
              grant_type: 'authorization_code',
              code: authCode,
              redirect_uri: REDIRECT_URI,
              code_verifier: codeVerifier
            })
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok || !data.access_token) throw new Error(data.error_description || data.error || `HTTP ${response.status}`);
          accessToken = data.access_token;
          localStorage.setItem(TOKEN_KEY, accessToken);
          window.history.replaceState({}, document.title, window.location.pathname);
          updateUi();
          setMessage('Spotify conectado. Presiona “Leer listas”.', 'ok');
        } catch (error) {
          setMessage(`No se pudo conectar Spotify: ${error.message || error}`, 'err');
          updateUi();
        }
      }

      function savePlaylistConfig() {
        const red = parsePlaylistId(redIdInput.value.trim()) || DEFAULT_PLAYLISTS.red;
        const blue = parsePlaylistId(blueIdInput.value.trim()) || DEFAULT_PLAYLISTS.blue;
        playlistConfig = { red, blue };
        localStorage.setItem(PLAYLIST_CONFIG_KEY, JSON.stringify(playlistConfig));
        redIdInput.value = red;
        blueIdInput.value = blue;
        setMessage('IDs de playlists guardados.', 'ok');
      }

      async function loadPlaylists() {
        if (!accessToken) return;
        savePlaylistConfig();
        btnLoad.disabled = true;
        btnCopy.disabled = true;
        btnDownload.disabled = true;
        btnPreview.disabled = true;
        listEl.innerHTML = '<div class="empty">Leyendo Spotify…</div>';
        outputPreview.classList.remove('show');
        previewVisible = false;
        setMessage('Consultando playlists…', '');

        const playlists = [
          { key: 'red', label: 'AdiBeat-Red', id: playlistConfig.red },
          { key: 'blue', label: 'AdiBeat-Blue', id: playlistConfig.blue }
        ].filter(p => p.id);

        const allTracks = [];
        const diagnostics = [];

        try {
          await spotifyJson('https://api.spotify.com/v1/me');

          for (const playlist of playlists) {
            try {
              const meta = await getPlaylistMeta(playlist.id).catch(() => null);
              const actualName = meta?.name || playlist.label;
              const items = await readPlaylistItems(playlist.id);
              const result = processPlaylistItems(items, { ...playlist, actualName });
              allTracks.push(...result.tracks);
              diagnostics.push(`${actualName}: ${result.tracks.length} canciones útiles de ${items.length} items${result.skipped ? `, ${result.skipped} omitidos` : ''}`);
            } catch (error) {
              diagnostics.push(`${playlist.label}: ERROR ${spotifyMessage(error)}`);
            }
          }

          tracks = mergeDuplicates(allTracks).sort(compareTracks);
          if (!tracks.length) throw new Error(`Spotify respondió, pero no encontré canciones utilizables. ${diagnostics.join(' · ')}`);

          renderList();
          updateStats();
          updateUi();
          updatePreview();
          setMessage(`Listas cargadas: ${tracks.length} canciones únicas. ${diagnostics.join(' · ')}`, 'ok');
        } catch (error) {
          tracks = [];
          renderList();
          updateStats();
          updateUi();
          setMessage(`No pude leer canciones: ${spotifyMessage(error)} ${diagnostics.length ? 'Detalle: ' + diagnostics.join(' · ') : ''}`, 'err');
        } finally {
          btnLoad.disabled = !accessToken;
        }
      }

      async function getPlaylistMeta(playlistId) {
        return spotifyJson(`https://api.spotify.com/v1/playlists/${encodeURIComponent(playlistId)}?fields=id,name,tracks(total)`);
      }

      async function readPlaylistItems(playlistId) {
        const items = [];
        let nextUrl = `https://api.spotify.com/v1/playlists/${encodeURIComponent(playlistId)}/items?limit=50&market=from_token&additional_types=track`;
        let guard = 0;
        while (nextUrl && guard < 100) {
          const data = await spotifyJson(nextUrl);
          if (Array.isArray(data.items)) items.push(...data.items);
          nextUrl = data.next || '';
          guard++;
        }
        return items;
      }

      function processPlaylistItems(items, playlist) {
        const out = [];
        let skipped = 0;
        for (const item of items) {
          const track = unwrapTrack(item);
          const spotifyId = extractSpotifyId(track);
          if (!track || !spotifyId) { skipped++; continue; }

          const title = cleanText(track.name || track.title || 'Sin título');
          if (!title || title === 'Sin título') { skipped++; continue; }

          const artists = extractArtists(track);
          const album = track.album || {};
          const albumName = cleanText(album.name || '');
          const releaseDate = cleanText(album.release_date || album.releaseDate || '');
          const images = Array.isArray(album.images) ? album.images : [];
          const albumArt = images.find(img => img?.url)?.url || '';
          const uri = track.uri && String(track.uri).startsWith('spotify:track:') ? track.uri : `spotify:track:${spotifyId}`;

          out.push({
            spotifyId,
            uri,
            title,
            artists,
            artist: artists.join(', ') || 'Artista no disponible',
            album: albumName,
            releaseDate,
            releaseYear: releaseDate ? releaseDate.slice(0, 4) : '',
            albumArt,
            playlists: [{ key: playlist.key, label: playlist.label, name: playlist.actualName, id: playlist.id }],
            originalArtist: curation[spotifyId]?.originalArtist || ''
          });
        }
        return { tracks: out, skipped };
      }

      function unwrapTrack(item) {
        if (!item) return null;
        let candidate = item.track || item;
        // Defensa contra respuestas o wrappers raros. Sí, Spotify a veces se pone creativo.
        for (let i = 0; i < 3; i++) {
          if (!candidate) return null;
          if (candidate.track && (candidate.track.id || candidate.track.uri || candidate.track.name)) candidate = candidate.track;
          else break;
        }
        if (candidate.type && candidate.type !== 'track') return null;
        if (candidate.is_local && !candidate.id) return null;
        return candidate;
      }

      function extractSpotifyId(track) {
        if (!track) return '';
        if (track.id) return String(track.id);
        const uri = String(track.uri || '');
        const uriMatch = uri.match(/^spotify:track:([A-Za-z0-9]+)$/);
        if (uriMatch) return uriMatch[1];
        const url = String(track.external_urls?.spotify || track.href || '');
        const urlMatch = url.match(/\/track\/([A-Za-z0-9]+)/);
        return urlMatch ? urlMatch[1] : '';
      }

      function extractArtists(track) {
        if (Array.isArray(track.artists)) {
          return track.artists.map(a => cleanText(a?.name || a)).filter(Boolean);
        }
        if (typeof track.artist === 'string') return [track.artist.trim()].filter(Boolean);
        return [];
      }

      function mergeDuplicates(input) {
        const map = new Map();
        for (const track of input) {
          if (!map.has(track.spotifyId)) {
            map.set(track.spotifyId, { ...track, playlists: [...track.playlists] });
            continue;
          }
          const existing = map.get(track.spotifyId);
          for (const p of track.playlists) {
            if (!existing.playlists.some(x => x.key === p.key && x.id === p.id)) existing.playlists.push(p);
          }
        }
        return [...map.values()];
      }

      function compareTracks(a, b) {
        const aBlue = a.playlists.some(p => p.key === 'blue') ? 0 : 1;
        const bBlue = b.playlists.some(p => p.key === 'blue') ? 0 : 1;
        if (aBlue !== bBlue) return aBlue - bBlue;
        return normalize(`${a.title} ${a.artist}`).localeCompare(normalize(`${b.title} ${b.artist}`));
      }

      function renderList() {
        const query = normalize(searchInput.value || '');
        const filtered = tracks.filter(t => normalize(`${t.title} ${t.artist} ${t.album} ${t.spotifyId} ${t.playlists.map(p => p.label + ' ' + p.name).join(' ')}`).includes(query));

        if (!tracks.length) {
          listEl.innerHTML = '<div class="empty">Sin canciones cargadas.</div>';
          return;
        }
        if (!filtered.length) {
          listEl.innerHTML = '<div class="empty">No hay canciones con ese filtro.</div>';
          return;
        }

        const frag = document.createDocumentFragment();
        for (const track of filtered) {
          const row = document.createElement('article');
          row.className = 'track';
          row.dataset.id = track.spotifyId;

          const img = document.createElement('img');
          img.className = 'cover';
          img.alt = `Portada de ${track.album || track.title}`;
          if (track.albumArt) img.src = track.albumArt;

          const info = document.createElement('div');
          info.className = 'song';
          info.innerHTML = `
            <div class="badges">${track.playlists.map(p => `<span class="badge ${escapeAttr(p.key)}">${escapeHtml(p.label)}</span>`).join('')}</div>
            <div class="title" title="${escapeAttr(track.title)}">${escapeHtml(track.title)}</div>
            <div class="artist" title="${escapeAttr(track.artist)}">${escapeHtml(track.artist)}</div>
            <div class="album" title="${escapeAttr(track.album)}">${escapeHtml(track.album || 'Álbum no disponible')}${track.releaseYear ? ` · ${escapeHtml(track.releaseYear)}` : ''}</div>
            <div class="tid">ID: ${escapeHtml(track.spotifyId)}</div>
          `;

          const edit = document.createElement('div');
          edit.className = 'original';
          const label = document.createElement('small');
          label.textContent = 'Artista original';
          const input = document.createElement('input');
          input.type = 'text';
          input.placeholder = 'Ej. Jeanette, The Beatles, etc.';
          input.value = track.originalArtist || '';
          input.dataset.id = track.spotifyId;
          input.autocomplete = 'off';
          input.addEventListener('input', handleOriginalInput);
          edit.append(label, input);

          row.append(img, info, edit);
          frag.appendChild(row);
        }
        listEl.innerHTML = '';
        listEl.appendChild(frag);
      }

      function handleOriginalInput(event) {
        const spotifyId = event.target.dataset.id;
        const value = event.target.value.trim();
        const track = tracks.find(t => t.spotifyId === spotifyId);
        if (!track) return;
        track.originalArtist = value;
        if (value) curation[spotifyId] = { originalArtist: value };
        else delete curation[spotifyId];
        localStorage.setItem(CURATION_KEY, JSON.stringify(curation));
        updateStats();
        updatePreview();
      }

      function buildJsonData() {
        return {
          version: 1,
          type: 'adibeat-original-artist-db',
          generatedAt: new Date().toISOString(),
          question: '¿Quién cantó originalmente esta canción?',
          answerLabel: 'Artista Original',
          tracks: tracks.map(t => ({
            spotifyId: t.spotifyId,
            uri: t.uri,
            title: t.title,
            artist: t.artist,
            artists: t.artists,
            album: t.album,
            releaseYear: t.releaseYear,
            playlists: t.playlists.map(p => p.label),
            contextualQuestion: '¿Quién cantó originalmente esta canción?',
            answerLabel: 'Artista Original',
            answer: t.originalArtist.trim()
          }))
        };
      }

      function buildJsonText() {
        return JSON.stringify(buildJsonData(), null, 2);
      }

      function togglePreview() {
        previewVisible = !previewVisible;
        outputPreview.classList.toggle('show', previewVisible);
        updatePreview();
      }

      function updatePreview() {
        if (!previewVisible) return;
        outputPreview.textContent = tracks.length ? buildJsonText() : '';
      }

      async function downloadJson() {
        if (!tracks.length) return;
        const blob = new Blob([buildJsonText()], { type: 'application/json;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `adibeat-original-artists-${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        setMessage('JSON generado y descargado.', 'ok');
      }

      function updateStats() {
        const red = tracks.filter(t => t.playlists.some(p => p.key === 'red')).length;
        const blue = tracks.filter(t => t.playlists.some(p => p.key === 'blue')).length;
        const filled = tracks.filter(t => t.originalArtist.trim()).length;
        statTotal.textContent = String(tracks.length);
        statRed.textContent = String(red);
        statBlue.textContent = String(blue);
        statFilled.textContent = String(filled);
      }

      function updateUi() {
        btnLogin.innerHTML = accessToken ? '<span class="material-symbols-rounded">restart_alt</span>Reconectar' : '<span class="material-symbols-rounded">account_circle</span>Conectar';
        btnLoad.disabled = !accessToken;
        const hasTracks = tracks.length > 0;
        btnCopy.disabled = !hasTracks;
        btnDownload.disabled = !hasTracks;
        btnPreview.disabled = !hasTracks;
      }

      async function spotifyJson(url, options = {}) {
        const response = await fetch(url, {
          ...options,
          headers: { Authorization: `Bearer ${accessToken}`, ...(options.headers || {}) }
        });
        const text = await response.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch (_) { data = { raw: text }; }
        if (!response.ok) {
          const msg = data?.error?.message || data?.error_description || data?.error || response.statusText;
          const error = new Error(`${response.status} ${msg}`);
          error.status = response.status;
          error.url = url;
          throw error;
        }
        return data;
      }

      function spotifyMessage(error) {
        return error?.message || String(error || 'Error desconocido');
      }

      async function copyText(text, okMessage) {
        try {
          await navigator.clipboard.writeText(text);
          setMessage(okMessage || 'Copiado.', 'ok');
        } catch (_) {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.focus();
          ta.select();
          const ok = document.execCommand('copy');
          ta.remove();
          setMessage(ok ? (okMessage || 'Copiado.') : 'No pude copiar automáticamente.', ok ? 'ok' : 'err');
        }
      }

      function parsePlaylistId(value) {
        const raw = String(value || '').trim();
        if (!raw) return '';
        const urlMatch = raw.match(/playlist\/([A-Za-z0-9]+)/);
        if (urlMatch) return urlMatch[1];
        const clean = raw.split('?')[0].trim();
        return /^[A-Za-z0-9]{10,}$/.test(clean) ? clean : '';
      }

      function setMessage(text, type) {
        messageEl.textContent = text || '';
        messageEl.className = `msg ${type || ''}`.trim();
      }

      function readJson(key, fallback) {
        try { return JSON.parse(localStorage.getItem(key) || '') || fallback; } catch (_) { return fallback; }
      }

      function cleanRedirectUri(href) {
        const url = new URL(href);
        url.search = '';
        url.hash = '';
        return url.toString();
      }

      function cleanText(value) { return String(value || '').replace(/\s+/g, ' ').trim(); }
      function normalize(value) { return String(value || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim(); }
      function escapeHtml(value) { return String(value ?? '').replace(/[&<>"]/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[ch])); }
      function escapeAttr(value) { return escapeHtml(value).replace(/'/g, '&#39;'); }
      function randomString(length) { const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'; let out = ''; const bytes = crypto.getRandomValues(new Uint8Array(length)); for (const b of bytes) out += chars[b % chars.length]; return out; }
      async function sha256(plain) { return crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain)); }
      function base64UrlEncode(buffer) { return btoa(String.fromCharCode(...new Uint8Array(buffer))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, ''); }
    })();
  </script>
</body>
</html>
