<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AdiBeat · Base de datos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0,0" rel="stylesheet">
  <style>
    :root {
      --bg-a: #101026;
      --bg-b: #151842;
      --bg-c: #24134d;
      --card: rgba(255,255,255,0.12);
      --card-strong: rgba(255,255,255,0.18);
      --line: rgba(255,255,255,0.18);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.68);
      --hot: #ff6b9d;
      --blue: #59d6ff;
      --yellow: #ffe66d;
      --green: #76f7b1;
      --danger: #ff6d7a;
      --shadow: 0 22px 70px rgba(0,0,0,0.34);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 0%, rgba(255,107,157,0.26), transparent 32%),
        radial-gradient(circle at 85% 12%, rgba(89,214,255,0.22), transparent 34%),
        radial-gradient(circle at 50% 100%, rgba(118,247,177,0.16), transparent 38%),
        linear-gradient(140deg, var(--bg-a), var(--bg-b) 52%, var(--bg-c));
      background-attachment: fixed;
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .material-symbols-rounded {
      font-family: 'Material Symbols Rounded';
      font-weight: normal;
      font-style: normal;
      font-size: 1.3em;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 24;
    }

    .app {
      width: min(1180px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) clamp(14px, 3vw, 28px) max(22px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: var(--radius-xl);
      background: rgba(8,10,28,0.62);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.45rem, 5vw, 2.5rem);
      line-height: 0.9;
      letter-spacing: -0.07em;
      font-weight: 900;
      background: linear-gradient(100deg, var(--yellow), var(--hot), var(--blue));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: clamp(0.82rem, 2.6vw, 0.98rem);
      line-height: 1.25;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill-btn {
      min-height: 44px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.92rem;
      font-weight: 800;
      box-shadow: 0 10px 25px rgba(0,0,0,0.18);
    }

    .pill-btn.primary {
      background: linear-gradient(135deg, rgba(255,107,157,0.96), rgba(89,214,255,0.86));
      color: #101026;
      text-shadow: none;
    }

    .pill-btn.green {
      background: linear-gradient(135deg, rgba(118,247,177,0.96), rgba(89,214,255,0.80));
      color: #101026;
      text-shadow: none;
    }

    .panel {
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.10);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(1.25);
      -webkit-backdrop-filter: blur(18px) saturate(1.25);
      overflow: hidden;
    }

    .status-panel {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
    }

    .stat {
      min-height: 76px;
      padding: 14px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat .value {
      font-size: clamp(1.25rem, 4vw, 2rem);
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .toolbar {
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
    }

    .searchbox, .format-select {
      min-height: 48px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 16px;
      color: var(--text);
      background: rgba(0,0,0,0.26);
      outline: none;
    }

    .searchbox::placeholder { color: rgba(255,255,255,0.42); }

    .format-select {
      min-width: 160px;
      color-scheme: dark;
    }

    .message {
      margin: 0 14px 14px;
      padding: 12px 14px;
      border-radius: var(--radius-md);
      background: rgba(0,0,0,0.24);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
      display: none;
    }

    .message.is-visible { display: block; }
    .message.error { color: #ffd4d8; border-color: rgba(255,109,122,0.35); background: rgba(255,109,122,0.12); }
    .message.ok { color: #d9ffe9; border-color: rgba(118,247,177,0.35); background: rgba(118,247,177,0.10); }

    .list {
      display: grid;
      gap: 10px;
      padding: 14px;
    }

    .track-card {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr) minmax(220px, 340px);
      gap: 12px;
      align-items: center;
      padding: 10px;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.12);
      min-width: 0;
    }

    .cover {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      object-fit: cover;
      background: rgba(255,255,255,0.10);
      box-shadow: 0 12px 24px rgba(0,0,0,0.22);
    }

    .track-info {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .title {
      font-weight: 900;
      font-size: 1rem;
      letter-spacing: -0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .artist, .album {
      color: var(--muted);
      font-size: 0.86rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.84);
    }

    .badge.blue { background: rgba(89,214,255,0.16); color: #bdefff; }
    .badge.red { background: rgba(255,107,157,0.16); color: #ffd0df; }

    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .input-label {
      color: rgba(255,255,255,0.58);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 900;
    }

    .original-input {
      width: 100%;
      min-height: 46px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.26);
      color: var(--text);
      padding: 0 14px;
      outline: none;
    }

    .original-input::placeholder { color: rgba(255,255,255,0.36); }
    .original-input:focus { border-color: rgba(89,214,255,0.8); box-shadow: 0 0 0 4px rgba(89,214,255,0.12); }

    .empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
      line-height: 1.45;
    }

    #output-preview {
      width: 100%;
      min-height: 210px;
      border: 0;
      border-top: 1px solid var(--line);
      resize: vertical;
      padding: 14px;
      color: #eaffff;
      background: rgba(0,0,0,0.46);
      outline: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.78rem;
      line-height: 1.45;
      display: none;
    }

    #output-preview.is-visible { display: block; }

    @media (max-width: 820px) {
      .topbar { grid-template-columns: 1fr; }
      .actions { justify-content: stretch; }
      .pill-btn { flex: 1; justify-content: center; }
      .status-panel { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr; }
      .format-select { min-width: 0; }
      .track-card { grid-template-columns: 54px minmax(0, 1fr); }
      .input-wrap { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>AdiBeat DB</h1>
        <p>Lee AdiBeat-Red y AdiBeat-Blue, agrega artista original y copia una base lista para pegar en el juego.</p>
      </div>
      <div class="actions">
        <button class="pill-btn" id="btn-login" type="button">
          <span class="material-symbols-rounded" aria-hidden="true">account_circle</span>
          Conectar
        </button>
        <button class="pill-btn primary" id="btn-load" type="button" disabled>
          <span class="material-symbols-rounded" aria-hidden="true">sync</span>
          Leer listas
        </button>
        <button class="pill-btn green" id="btn-copy" type="button" disabled>
          <span class="material-symbols-rounded" aria-hidden="true">content_copy</span>
          Copiar base
        </button>
      </div>
    </header>

    <section class="panel status-panel" aria-label="Resumen">
      <div class="stat">
        <div class="label">Canciones</div>
        <div class="value" id="stat-total">0</div>
      </div>
      <div class="stat">
        <div class="label">Red</div>
        <div class="value" id="stat-red">0</div>
      </div>
      <div class="stat">
        <div class="label">Blue</div>
        <div class="value" id="stat-blue">0</div>
      </div>
      <div class="stat">
        <div class="label">Curadas</div>
        <div class="value" id="stat-filled">0</div>
      </div>
    </section>

    <section class="panel">
      <div class="toolbar">
        <input class="searchbox" id="search" type="search" placeholder="Buscar canción, artista, álbum o playlist…">
        <select class="format-select" id="format-select" aria-label="Formato de copia">
          <option value="js">JS para pegar en AdiBeat</option>
          <option value="json">JSON puro</option>
        </select>
        <button class="pill-btn" id="btn-preview" type="button" disabled>
          <span class="material-symbols-rounded" aria-hidden="true">visibility</span>
          Vista previa
        </button>
      </div>
      <p class="message" id="message"></p>
      <div class="list" id="track-list">
        <div class="empty">Conecta Spotify y presiona <strong>Leer listas</strong>. Si esto suena demasiado razonable, es porque todavía no intervino una API externa.</div>
      </div>
      <textarea id="output-preview" spellcheck="false" readonly></textarea>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      const CLIENT_ID = 'e848a261a8e7411a8a1138326bd4a18f';
      const REDIRECT_URI = window.location.origin + window.location.pathname;
      const SCOPES = 'playlist-read-private playlist-read-collaborative user-read-private user-read-email';
      const TOKEN_KEY = 'adibeat_db_token';
      const VERIFIER_KEY = 'adibeat_db_code_verifier';
      const CURATION_KEY = 'adibeat_original_artist_curation_v1';

      const PLAYLISTS = [
        { key: 'red', label: 'AdiBeat-Red', id: '00MtRUjzL76Njcqe0mNvsD' },
        { key: 'blue', label: 'AdiBeat-Blue', id: '3v71SvyMLTBhbpTfAkMizr' }
      ];

      let accessToken = localStorage.getItem(TOKEN_KEY) || '';
      let tracks = [];
      let curation = readCuration();
      let previewVisible = false;

      const btnLogin = document.getElementById('btn-login');
      const btnLoad = document.getElementById('btn-load');
      const btnCopy = document.getElementById('btn-copy');
      const btnPreview = document.getElementById('btn-preview');
      const searchInput = document.getElementById('search');
      const formatSelect = document.getElementById('format-select');
      const listEl = document.getElementById('track-list');
      const messageEl = document.getElementById('message');
      const outputPreview = document.getElementById('output-preview');
      const statTotal = document.getElementById('stat-total');
      const statRed = document.getElementById('stat-red');
      const statBlue = document.getElementById('stat-blue');
      const statFilled = document.getElementById('stat-filled');

      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');

      boot();

      function boot() {
        bindEvents();

        if (code && !accessToken) {
          completeSpotifyLogin(code);
          return;
        }

        updateAuthUi();
        if (accessToken) {
          setMessage('Spotify conectado. Puedes leer AdiBeat-Red y AdiBeat-Blue.', 'ok');
        }
      }

      function bindEvents() {
        btnLogin.addEventListener('click', () => {
          localStorage.removeItem(TOKEN_KEY);
          accessToken = '';
          startSpotifyLogin();
        });

        btnLoad.addEventListener('click', loadPlaylists);
        btnCopy.addEventListener('click', copyDatabase);
        btnPreview.addEventListener('click', togglePreview);
        searchInput.addEventListener('input', renderList);
        formatSelect.addEventListener('change', updatePreview);
      }

      function updateAuthUi() {
        btnLogin.innerHTML = accessToken
          ? '<span class="material-symbols-rounded" aria-hidden="true">restart_alt</span>Reconectar'
          : '<span class="material-symbols-rounded" aria-hidden="true">account_circle</span>Conectar';
        btnLoad.disabled = !accessToken;
        btnCopy.disabled = tracks.length === 0;
        btnPreview.disabled = tracks.length === 0;
      }

      async function startSpotifyLogin() {
        const codeVerifier = randomString(64);
        localStorage.setItem(VERIFIER_KEY, codeVerifier);
        const codeChallenge = base64UrlEncode(await sha256(codeVerifier));

        const authUrl = new URL('https://accounts.spotify.com/authorize');
        authUrl.search = new URLSearchParams({
          client_id: CLIENT_ID,
          response_type: 'code',
          redirect_uri: REDIRECT_URI,
          scope: SCOPES,
          code_challenge_method: 'S256',
          code_challenge: codeChallenge,
          show_dialog: 'true'
        }).toString();

        window.location.href = authUrl.toString();
      }

      async function completeSpotifyLogin(authCode) {
        try {
          const codeVerifier = localStorage.getItem(VERIFIER_KEY) || '';
          const response = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
              client_id: CLIENT_ID,
              grant_type: 'authorization_code',
              code: authCode,
              redirect_uri: REDIRECT_URI,
              code_verifier: codeVerifier
            })
          });

          const data = await response.json();
          if (!data.access_token) throw new Error(data.error_description || 'Spotify no devolvió token.');

          accessToken = data.access_token;
          localStorage.setItem(TOKEN_KEY, accessToken);
          window.history.replaceState({}, document.title, window.location.pathname);
          updateAuthUi();
          setMessage('Spotify conectado. Ahora puedes leer las listas.', 'ok');
        } catch (error) {
          setMessage(`No se pudo conectar Spotify. ${error.message || ''}`, 'error');
          updateAuthUi();
        }
      }

      async function loadPlaylists() {
        if (!accessToken) return;

        btnLoad.disabled = true;
        btnCopy.disabled = true;
        btnPreview.disabled = true;
        listEl.innerHTML = '<div class="empty">Leyendo playlists…</div>';
        setMessage('Consultando Spotify…', '');

        try {
          await spotifyJson('https://api.spotify.com/v1/me');

          const collected = [];
          for (const playlist of PLAYLISTS) {
            const playlistData = await spotifyJson(`https://api.spotify.com/v1/playlists/${playlist.id}`);
            const playlistName = playlistData?.name || playlist.label;
            const items = await readPlaylistItems(playlist.id);
            collected.push(...processItems(items, { ...playlist, label: playlistName }));
          }

          tracks = mergeDuplicates(collected).sort(compareTracks);
          renderList();
          updateStats();
          updateAuthUi();
          setMessage(`Listas cargadas: ${tracks.length} canciones únicas. Los campos se guardan localmente al escribir.`, 'ok');
          updatePreview();
        } catch (error) {
          tracks = [];
          renderList();
          updateStats();
          updateAuthUi();
          setMessage(`No pude leer las playlists. ${spotifyMessage(error)}`, 'error');
        } finally {
          btnLoad.disabled = !accessToken;
        }
      }

      async function readPlaylistItems(playlistId) {
        const items = [];
        let nextUrl = `https://api.spotify.com/v1/playlists/${playlistId}/items?limit=50`;
        let guard = 0;

        while (nextUrl && guard < 50) {
          const data = await spotifyJson(nextUrl);
          if (Array.isArray(data.items)) items.push(...data.items);
          nextUrl = data.next;
          guard++;
        }

        return items;
      }

      function processItems(items, playlist) {
        return items
          .map(item => item?.track)
          .filter(track => track && track.type === 'track' && track.uri)
          .map(track => {
            const artists = Array.isArray(track.artists) ? track.artists.map(a => a.name).filter(Boolean) : [];
            const images = track.album?.images || [];
            const releaseDate = track.album?.release_date || '';

            return {
              uri: track.uri,
              id: track.id || track.uri.replace('spotify:track:', ''),
              title: track.name || 'Sin título',
              artists,
              artistText: artists.join(', ') || 'Artista no disponible',
              album: track.album?.name || '',
              releaseDate,
              releaseYear: releaseDate ? releaseDate.slice(0, 4) : '',
              albumArt: images[1]?.url || images[0]?.url || '',
              playlists: [{ key: playlist.key, label: playlist.label, id: playlist.id }],
              originalArtist: curation[track.uri]?.originalArtist || ''
            };
          });
      }

      function mergeDuplicates(input) {
        const map = new Map();

        for (const track of input) {
          if (!map.has(track.uri)) {
            map.set(track.uri, { ...track, playlists: [...track.playlists] });
            continue;
          }

          const existing = map.get(track.uri);
          for (const playlist of track.playlists) {
            if (!existing.playlists.some(p => p.key === playlist.key)) existing.playlists.push(playlist);
          }
        }

        return [...map.values()];
      }

      function compareTracks(a, b) {
        const aBlue = a.playlists.some(p => p.key === 'blue') ? 0 : 1;
        const bBlue = b.playlists.some(p => p.key === 'blue') ? 0 : 1;
        if (aBlue !== bBlue) return aBlue - bBlue;
        return `${a.title} ${a.artistText}`.localeCompare(`${b.title} ${b.artistText}`, 'es', { sensitivity: 'base' });
      }

      function renderList() {
        const query = normalize(searchInput.value);
        const filtered = tracks.filter(track => {
          if (!query) return true;
          return normalize(`${track.title} ${track.artistText} ${track.album} ${track.playlists.map(p => p.label).join(' ')}`).includes(query);
        });

        if (!tracks.length) {
          listEl.innerHTML = '<div class="empty">No hay canciones cargadas todavía.</div>';
          return;
        }

        if (!filtered.length) {
          listEl.innerHTML = '<div class="empty">No hay coincidencias con esa búsqueda.</div>';
          return;
        }

        const fragment = document.createDocumentFragment();

        filtered.forEach(track => {
          const card = document.createElement('article');
          card.className = 'track-card';
          card.dataset.uri = track.uri;

          const cover = document.createElement('img');
          cover.className = 'cover';
          cover.alt = `Portada de ${track.album || track.title}`;
          cover.loading = 'lazy';
          cover.src = track.albumArt || '';

          const info = document.createElement('div');
          info.className = 'track-info';
          info.innerHTML = `
            <div class="badges">${track.playlists.map(p => `<span class="badge ${escapeAttr(p.key)}">${escapeHtml(p.label)}</span>`).join('')}</div>
            <div class="title" title="${escapeAttr(track.title)}">${escapeHtml(track.title)}</div>
            <div class="artist" title="${escapeAttr(track.artistText)}">${escapeHtml(track.artistText)}</div>
            <div class="album" title="${escapeAttr(track.album)}">${escapeHtml(track.album || 'Álbum no disponible')}${track.releaseYear ? ` · ${escapeHtml(track.releaseYear)}` : ''}</div>
          `;

          const wrap = document.createElement('label');
          wrap.className = 'input-wrap';
          wrap.innerHTML = '<span class="input-label">Artista original</span>';

          const input = document.createElement('input');
          input.className = 'original-input';
          input.type = 'text';
          input.autocomplete = 'off';
          input.placeholder = 'Ej. Cecilia, José José, The Beatles…';
          input.value = track.originalArtist || '';
          input.dataset.uri = track.uri;
          input.addEventListener('input', handleOriginalArtistInput);

          wrap.appendChild(input);
          card.append(cover, info, wrap);
          fragment.appendChild(card);
        });

        listEl.replaceChildren(fragment);
      }

      function handleOriginalArtistInput(event) {
        const uri = event.target.dataset.uri;
        const value = event.target.value.trim();
        const track = tracks.find(item => item.uri === uri);
        if (!track) return;

        track.originalArtist = value;

        if (value) {
          curation[uri] = { originalArtist: value };
        } else {
          delete curation[uri];
        }

        saveCuration();
        updateStats();
        updatePreview();
      }

      function updateStats() {
        const redCount = tracks.filter(t => t.playlists.some(p => p.key === 'red')).length;
        const blueCount = tracks.filter(t => t.playlists.some(p => p.key === 'blue')).length;
        const filledCount = tracks.filter(t => t.originalArtist.trim()).length;

        statTotal.textContent = String(tracks.length);
        statRed.textContent = String(redCount);
        statBlue.textContent = String(blueCount);
        statFilled.textContent = String(filledCount);
      }

      function buildDatabase() {
        return tracks.map(track => {
          const originalArtist = track.originalArtist.trim();
          return {
            uri: track.uri,
            spotifyId: track.id,
            title: track.title,
            artists: track.artists,
            artist: track.artistText,
            album: track.album,
            releaseDate: track.releaseDate,
            releaseYear: track.releaseYear,
            playlists: track.playlists.map(p => p.label),
            originalArtist,
            contextualQuestion: originalArtist ? '¿Quién cantó originalmente esta canción?' : '',
            contextualAnswer: originalArtist
          };
        });
      }

      function buildOutputText() {
        const db = buildDatabase();

        if (formatSelect.value === 'json') {
          return JSON.stringify(db, null, 2);
        }

        return `const ADIBEAT_CONTEXT_DB = ${JSON.stringify(db, null, 2)};`;
      }

      async function copyDatabase() {
        if (!tracks.length) return;
        const text = buildOutputText();

        try {
          await copyText(text);
          setMessage('Base de datos copiada al portapapeles.', 'ok');
        } catch (error) {
          outputPreview.value = text;
          outputPreview.classList.add('is-visible');
          previewVisible = true;
          setMessage('No pude copiar automáticamente. Dejé el texto en la vista previa para copiarlo manualmente.', 'error');
        }
      }

      function togglePreview() {
        previewVisible = !previewVisible;
        outputPreview.classList.toggle('is-visible', previewVisible);
        updatePreview();
      }

      function updatePreview() {
        if (!tracks.length) {
          outputPreview.value = '';
          return;
        }

        if (previewVisible) outputPreview.value = buildOutputText();
      }

      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return;
        }

        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        const ok = document.execCommand('copy');
        textarea.remove();
        if (!ok) throw new Error('copy failed');
      }

      async function spotifyJson(url, options = {}) {
        const response = await fetch(url, {
          ...options,
          headers: {
            ...(options.headers || {}),
            'Authorization': `Bearer ${accessToken}`
          }
        });

        if (response.status === 401) {
          localStorage.removeItem(TOKEN_KEY);
          accessToken = '';
          updateAuthUi();
          throw new Error('Sesión expirada. Reconecta Spotify.');
        }

        if (!response.ok) {
          let detail = '';
          try {
            const data = await response.json();
            detail = data?.error?.message || data?.error_description || '';
          } catch (_) {}
          throw new Error(`Spotify respondió ${response.status}. ${detail}`.trim());
        }

        if (response.status === 204) return {};
        return response.json();
      }

      function spotifyMessage(error) {
        return error?.message || 'Error desconocido.';
      }

      function setMessage(text, type) {
        messageEl.textContent = text;
        messageEl.className = 'message is-visible';
        if (type) messageEl.classList.add(type);
      }

      function readCuration() {
        try {
          return JSON.parse(localStorage.getItem(CURATION_KEY) || '{}');
        } catch (_) {
          return {};
        }
      }

      function saveCuration() {
        localStorage.setItem(CURATION_KEY, JSON.stringify(curation));
      }

      function normalize(value) {
        return String(value || '')
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toLowerCase()
          .trim();
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, '&#096;');
      }

      function randomString(length) {
        const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        const values = crypto.getRandomValues(new Uint8Array(length));
        return Array.from(values, x => possible[x % possible.length]).join('');
      }

      async function sha256(plain) {
        const encoder = new TextEncoder();
        const data = encoder.encode(plain);
        return crypto.subtle.digest('SHA-256', data);
      }

      function base64UrlEncode(input) {
        return btoa(String.fromCharCode(...new Uint8Array(input)))
          .replace(/=/g, '')
          .replace(/\+/g, '-')
          .replace(/\//g, '_');
      }
    })();
  </script>
