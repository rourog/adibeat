<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AdiBeat Blue · Artista Original</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet">
  <style>
    :root {
      --bg-a:#09111f;
      --bg-b:#10284a;
      --bg-c:#29144d;
      --panel:rgba(255,255,255,.10);
      --panel-strong:rgba(255,255,255,.16);
      --line:rgba(255,255,255,.16);
      --text:#fff;
      --muted:rgba(255,255,255,.66);
      --blue:#5bd8ff;
      --pink:#ff6ba8;
      --yellow:#ffe66d;
      --green:#7af7b8;
      --danger:#ff6b7c;
      --shadow:0 18px 50px rgba(0,0,0,.32);
      --radius:22px;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 8% 0%, rgba(91,216,255,.24), transparent 34%),
        radial-gradient(circle at 92% 12%, rgba(255,107,168,.22), transparent 34%),
        linear-gradient(135deg,var(--bg-a),var(--bg-b) 48%,var(--bg-c));
      background-attachment:fixed;
    }

    button,input { font:inherit; }

    button {
      border:0;
      cursor:pointer;
      color:var(--text);
      touch-action:manipulation;
    }

    button:disabled { opacity:.45; cursor:not-allowed; }

    .material-symbols-rounded {
      font-family:'Material Symbols Rounded';
      font-size:1.22em;
      line-height:1;
      vertical-align:-.18em;
      font-variation-settings:'FILL' 0,'wght' 700,'GRAD' 0,'opsz' 24;
    }

    .app {
      width:min(920px,100%);
      margin:0 auto;
      min-height:100vh;
      padding:max(12px,env(safe-area-inset-top)) clamp(10px,2.5vw,20px) max(18px,env(safe-area-inset-bottom));
      display:grid;
      grid-template-rows:auto auto 1fr;
      gap:10px;
    }

    .topbar {
      position:sticky;
      top:0;
      z-index:10;
      display:grid;
      grid-template-columns:1fr auto auto auto;
      gap:8px;
      align-items:center;
      padding:10px;
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:rgba(5,10,24,.70);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px) saturate(1.35);
      -webkit-backdrop-filter:blur(18px) saturate(1.35);
    }

    h1 {
      margin:0;
      font-size:clamp(1.35rem,4.6vw,2.15rem);
      line-height:.92;
      letter-spacing:-.07em;
      font-weight:900;
      background:linear-gradient(100deg,var(--blue),var(--pink),var(--yellow));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      white-space:nowrap;
    }

    .btn {
      min-height:42px;
      padding:0 13px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      font-weight:900;
      white-space:nowrap;
      background:rgba(255,255,255,.13);
      border:1px solid var(--line);
      box-shadow:0 10px 24px rgba(0,0,0,.18);
    }

    .btn.primary {
      color:#07111f;
      background:linear-gradient(135deg,var(--blue),var(--green));
    }

    .btn.hot {
      color:#07111f;
      background:linear-gradient(135deg,var(--yellow),var(--pink));
    }

    .status {
      min-height:38px;
      padding:8px 12px;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.08);
      color:var(--muted);
      font-size:.86rem;
      line-height:1.25;
    }

    .status.ok { color:var(--green); }
    .status.err { color:var(--danger); }
    .status.warn { color:var(--yellow); }

    .list {
      display:grid;
      gap:8px;
      align-content:start;
    }

    .empty {
      padding:22px;
      text-align:center;
      color:var(--muted);
      border:1px dashed rgba(255,255,255,.22);
      border-radius:var(--radius);
      background:rgba(0,0,0,.16);
    }

    .row {
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(180px,260px);
      gap:10px;
      align-items:center;
      padding:10px;
      border-radius:var(--radius);
      border:1px solid rgba(255,255,255,.13);
      background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.07));
      box-shadow:0 10px 28px rgba(0,0,0,.18);
      backdrop-filter:blur(12px) saturate(1.25);
      -webkit-backdrop-filter:blur(12px) saturate(1.25);
    }

    .row.has-data {
      border-color:rgba(122,247,184,.50);
      background:linear-gradient(135deg,rgba(122,247,184,.18),rgba(255,255,255,.07));
    }

    .track-title {
      min-width:0;
      font-size:.98rem;
      font-weight:900;
      letter-spacing:-.035em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .track-artist {
      min-width:0;
      margin-top:3px;
      color:var(--muted);
      font-size:.84rem;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .original-input {
      width:100%;
      min-height:42px;
      border:1px solid var(--line);
      border-radius:16px;
      padding:0 12px;
      outline:none;
      color:var(--text);
      background:rgba(0,0,0,.27);
    }

    .original-input:focus {
      border-color:rgba(91,216,255,.78);
      box-shadow:0 0 0 4px rgba(91,216,255,.12);
    }

    @media (max-width:720px) {
      .topbar { grid-template-columns:1fr 1fr; }
      h1 { grid-column:1/-1; text-align:center; }
      .btn { width:100%; min-height:40px; padding:0 10px; font-size:.88rem; }
      .row { grid-template-columns:1fr; gap:8px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>AdiBeat Blue</h1>
      <button class="btn" id="btn-reconnect" type="button"><span class="material-symbols-rounded">restart_alt</span>Reconectar</button>
      <button class="btn primary" id="btn-load" type="button" disabled><span class="material-symbols-rounded">sync</span>Leer lista</button>
      <button class="btn hot" id="btn-copy" type="button" disabled><span class="material-symbols-rounded">content_copy</span>Copiar JSON</button>
    </header>

    <div class="status" id="status">Conecta Spotify y lee AdiBeat-Blue. La base local se lee desde <strong>adibeat-blue-original-artist-db.json</strong>.</div>

    <section class="list" id="track-list">
      <div class="empty">Sin canciones cargadas.</div>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      const CLIENT_ID = 'e848a261a8e7411a8a1138326bd4a18f';
      const REDIRECT_URI_OVERRIDE = '';
      const REDIRECT_URI = REDIRECT_URI_OVERRIDE || cleanRedirectUri(window.location.href);
      const SCOPES = 'playlist-read-private playlist-read-collaborative user-read-private';

      const BLUE_PLAYLIST_ID = '3v71SvyMLTBhbpTfAkMizr';
      const DB_FILE_NAME = 'adibeat-blue-original-artist-db.json';
      const TOKEN_KEY = 'adibeat_blue_tool_token_v1';
      const VERIFIER_KEY = 'adibeat_blue_tool_verifier_v1';
      const CURATION_KEY = 'adibeat_blue_original_artist_draft_v2';

      let accessToken = localStorage.getItem(TOKEN_KEY) || '';
      let tracks = [];
      let curation = {};
      let dbFileLoaded = false;
      let dbFileCount = 0;
      let dbFileStatus = `BD local pendiente: ${DB_FILE_NAME}`;

      const $ = id => document.getElementById(id);
      const btnReconnect = $('btn-reconnect');
      const btnLoad = $('btn-load');
      const btnCopy = $('btn-copy');
      const statusEl = $('status');
      const listEl = $('track-list');

      boot();

      function boot() {
        btnReconnect.addEventListener('click', reconnectSpotify);
        btnLoad.addEventListener('click', loadBluePlaylist);
        btnCopy.addEventListener('click', copyJsonToClipboard);

        const code = new URLSearchParams(window.location.search).get('code');
        if (code && !accessToken) {
          completeSpotifyLogin(code);
          return;
        }

        updateButtons();
        loadLocalDatabase(false).then(() => {
          if (accessToken) {
            setStatus(`Spotify conectado. ${dbFileStatus}. Presiona “Leer lista”.`, 'ok');
          } else {
            setStatus(`Conecta Spotify. ${dbFileStatus}.`, dbFileLoaded ? 'ok' : 'warn');
          }
        });
      }

      async function reconnectSpotify() {
        localStorage.removeItem(TOKEN_KEY);
        accessToken = '';
        updateButtons();
        await startSpotifyLogin();
      }

      async function startSpotifyLogin() {
        const codeVerifier = randomString(64);
        localStorage.setItem(VERIFIER_KEY, codeVerifier);
        const codeChallenge = base64UrlEncode(await sha256(codeVerifier));

        const authUrl = new URL('https://accounts.spotify.com/authorize');
        authUrl.search = new URLSearchParams({
          client_id: CLIENT_ID,
          response_type: 'code',
          redirect_uri: REDIRECT_URI,
          scope: SCOPES,
          code_challenge_method: 'S256',
          code_challenge: codeChallenge,
          show_dialog: 'true'
        }).toString();

        window.location.href = authUrl.toString();
      }

      async function completeSpotifyLogin(authCode) {
        try {
          const codeVerifier = localStorage.getItem(VERIFIER_KEY) || '';
          const response = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
              client_id: CLIENT_ID,
              grant_type: 'authorization_code',
              code: authCode,
              redirect_uri: REDIRECT_URI,
              code_verifier: codeVerifier
            })
          });

          const data = await response.json().catch(() => ({}));
          if (!response.ok || !data.access_token) {
            throw new Error(data.error_description || data.error || `HTTP ${response.status}`);
          }

          accessToken = data.access_token;
          localStorage.setItem(TOKEN_KEY, accessToken);
          window.history.replaceState({}, document.title, window.location.pathname);
          updateButtons();
          setStatus('Spotify conectado. Leyendo base local y AdiBeat-Blue…', 'ok');
          await loadLocalDatabase(true);
          await loadBluePlaylist();
        } catch (error) {
          setStatus(`No se pudo conectar Spotify: ${messageOf(error)}`, 'err');
          updateButtons();
        }
      }

      async function loadBluePlaylist() {
        if (!accessToken) return startSpotifyLogin();

        btnLoad.disabled = true;
        btnCopy.disabled = true;
        listEl.innerHTML = '<div class="empty">Leyendo base local y AdiBeat-Blue…</div>';
        setStatus('Consultando base local y Spotify…', '');

        try {
          await loadLocalDatabase(true);
          await spotifyJson('https://api.spotify.com/v1/me');
          const items = await readPlaylistItems(BLUE_PLAYLIST_ID);
          tracks = processPlaylistItems(items);

          if (!tracks.length) {
            throw new Error(`Spotify respondió ${items.length} items, pero ninguno tenía una canción válida.`);
          }

          renderTracks();
          updateButtons();
          const filled = countFilled();
          setStatus(`AdiBeat-Blue cargada: ${tracks.length} canciones. ${dbFileStatus}. Capturadas: ${filled}.`, 'ok');
        } catch (error) {
          if (error.status === 401) {
            localStorage.removeItem(TOKEN_KEY);
            accessToken = '';
            updateButtons();
          }
          tracks = [];
          renderTracks();
          setStatus(`No pude leer AdiBeat-Blue: ${messageOf(error)}`, 'err');
        } finally {
          updateButtons();
        }
      }

      async function readPlaylistItems(playlistId) {
        const items = [];
        let nextUrl = `https://api.spotify.com/v1/playlists/${encodeURIComponent(playlistId)}/items?limit=50&additional_types=track`;
        let guard = 0;

        while (nextUrl && guard < 100) {
          const data = await spotifyJson(nextUrl);
          if (Array.isArray(data.items)) items.push(...data.items);
          nextUrl = data.next || '';
          guard++;
        }

        return items;
      }


      async function loadLocalDatabase(force = false) {
        if (dbFileLoaded && !force) return;

        const draftMap = readJson(CURATION_KEY, {});
        let fileMap = {};

        try {
          const response = await fetch(`${DB_FILE_NAME}?v=${Date.now()}`, { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const data = await response.json();
          fileMap = databaseToMap(data);
          dbFileLoaded = true;
          dbFileCount = Object.keys(fileMap).length;
          dbFileStatus = `BD local: ${dbFileCount} respuestas`;
        } catch (error) {
          dbFileLoaded = false;
          dbFileCount = 0;
          dbFileStatus = `BD local no encontrada o ilegible (${DB_FILE_NAME})`;
        }

        // El archivo JSON manda. El borrador local solo rellena canciones que aún no existen en el archivo.
        curation = { ...draftMap, ...fileMap };
      }

      function databaseToMap(data) {
        const map = {};
        const records = Array.isArray(data) ? data : (Array.isArray(data?.tracks) ? data.tracks : []);

        for (const record of records) {
          const spotifyId = extractSpotifyId(record);
          const answer = cleanText(
            record?.answer ||
            record?.originalArtist ||
            record?.contextualAnswer ||
            record?.artistaOriginal ||
            ''
          );
          if (spotifyId && answer) map[spotifyId] = answer;
        }

        return map;
      }

      function processPlaylistItems(items) {
        const output = [];
        const seen = new Set();

        for (const playlistItem of items) {
          const track = unwrapTrack(playlistItem);
          const spotifyId = extractSpotifyId(track);
          if (!track || !spotifyId || seen.has(spotifyId)) continue;

          const title = cleanText(track.name || 'Sin título');
          const artist = extractArtists(track).join(', ') || 'Artista no disponible';
          if (!title || title === 'Sin título') continue;

          seen.add(spotifyId);
          output.push({
            spotifyId,
            title,
            artist,
            originalArtist: curation[spotifyId] || ''
          });
        }

        return output;
      }

      function unwrapTrack(playlistItem) {
        if (!playlistItem) return null;
        let candidate = playlistItem.item || playlistItem.track || playlistItem;

        for (let i = 0; i < 4; i++) {
          if (!candidate) return null;
          if (candidate.item && (candidate.item.id || candidate.item.uri || candidate.item.name || candidate.item.type)) {
            candidate = candidate.item;
            continue;
          }
          if (candidate.track && (candidate.track.id || candidate.track.uri || candidate.track.name || candidate.track.type)) {
            candidate = candidate.track;
            continue;
          }
          break;
        }

        if (candidate.type && candidate.type !== 'track') return null;
        if (candidate.is_local && !candidate.id) return null;
        return candidate;
      }

      function renderTracks() {
        if (!tracks.length) {
          listEl.innerHTML = '<div class="empty">Sin canciones cargadas.</div>';
          return;
        }

        const fragment = document.createDocumentFragment();

        for (const track of tracks) {
          const row = document.createElement('article');
          row.className = `row ${track.originalArtist ? 'has-data' : ''}`.trim();

          const info = document.createElement('div');
          info.innerHTML = `
            <div class="track-title" title="${escapeAttr(track.title)}">${escapeHtml(track.title)}</div>
            <div class="track-artist" title="${escapeAttr(track.artist)}">${escapeHtml(track.artist)}</div>
          `;

          const input = document.createElement('input');
          input.className = 'original-input';
          input.type = 'text';
          input.autocomplete = 'off';
          input.placeholder = 'Artista original';
          input.value = track.originalArtist || '';
          input.dataset.id = track.spotifyId;
          input.addEventListener('input', handleOriginalInput);

          row.append(info, input);
          fragment.appendChild(row);
        }

        listEl.innerHTML = '';
        listEl.appendChild(fragment);
      }

      function handleOriginalInput(event) {
        const spotifyId = event.target.dataset.id;
        const value = event.target.value.trim();
        const track = tracks.find(item => item.spotifyId === spotifyId);
        if (!track) return;

        track.originalArtist = value;
        if (value) curation[spotifyId] = value;
        else delete curation[spotifyId];
        localStorage.setItem(CURATION_KEY, JSON.stringify(curation));
        event.target.closest('.row')?.classList.toggle('has-data', Boolean(value));

        setStatus(`AdiBeat-Blue cargada: ${tracks.length} canciones. ${dbFileStatus}. Capturadas: ${countFilled()}.`, 'ok');
      }

      function buildJsonData() {
        return {
          version: 1,
          type: 'adibeat-blue-original-artist-db',
          playlistId: BLUE_PLAYLIST_ID,
          question: '¿Quién cantó originalmente esta canción?',
          answerLabel: 'Artista Original',
          tracks: tracks
            .filter(track => track.originalArtist.trim())
            .map(track => ({
              spotifyId: track.spotifyId,
              answer: track.originalArtist.trim()
            }))
        };
      }

      async function copyJsonToClipboard() {
        if (!tracks.length) {
          setStatus('Primero lee AdiBeat-Blue.', 'warn');
          return;
        }

        const data = buildJsonData();
        if (!data.tracks.length) {
          setStatus('No hay artistas originales capturados todavía.', 'warn');
          return;
        }

        const text = JSON.stringify(data, null, 2);
        try {
          await navigator.clipboard.writeText(text);
          setStatus(`JSON copiado: ${data.tracks.length} respuestas. Reemplaza ${DB_FILE_NAME} en GitHub.`, 'ok');
        } catch (_) {
          fallbackCopy(text);
          setStatus(`JSON copiado: ${data.tracks.length} respuestas. Reemplaza ${DB_FILE_NAME} en GitHub.`, 'ok');
        }
      }

      function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        document.execCommand('copy');
        textarea.remove();
      }

      async function spotifyJson(url, options = {}) {
        const response = await fetch(url, {
          ...options,
          headers: { Authorization: `Bearer ${accessToken}`, ...(options.headers || {}) }
        });

        const text = await response.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch (_) { data = { raw: text }; }

        if (!response.ok) {
          const msg = data?.error?.message || data?.error_description || data?.error || response.statusText;
          const error = new Error(`${response.status} ${msg}`);
          error.status = response.status;
          throw error;
        }

        return data;
      }

      function updateButtons() {
        btnLoad.disabled = !accessToken;
        btnCopy.disabled = !tracks.length;
      }

      function countFilled() {
        return tracks.filter(track => track.originalArtist.trim()).length;
      }

      function extractSpotifyId(track) {
        if (!track) return '';
        if (track.spotifyId) return String(track.spotifyId);
        if (track.trackId) return String(track.trackId);
        if (track.id) return String(track.id);
        const uri = String(track.uri || '');
        const uriMatch = uri.match(/^spotify:track:([A-Za-z0-9]+)$/);
        if (uriMatch) return uriMatch[1];
        const url = String(track.external_urls?.spotify || track.href || '');
        const urlMatch = url.match(/\/track\/([A-Za-z0-9]+)/);
        return urlMatch ? urlMatch[1] : '';
      }

      function extractArtists(track) {
        if (Array.isArray(track?.artists)) {
          return track.artists.map(artist => cleanText(artist?.name || artist)).filter(Boolean);
        }
        return [];
      }

      function setStatus(text, type) {
        statusEl.textContent = text || '';
        statusEl.className = `status ${type || ''}`.trim();
      }

      function messageOf(error) {
        return error?.message || String(error || 'Error desconocido');
      }

      function readJson(key, fallback) {
        try { return JSON.parse(localStorage.getItem(key) || '') || fallback; }
        catch (_) { return fallback; }
      }

      function cleanRedirectUri(href) {
        const url = new URL(href);
        url.search = '';
        url.hash = '';
        return url.toString();
      }

      function cleanText(value) {
        return String(value || '').replace(/\s+/g, ' ').trim();
      }

      function escapeHtml(value) {
        return String(value ?? '').replace(/[&<>"]/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[char]));
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/'/g, '&#39;');
      }

      function randomString(length) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
        const bytes = crypto.getRandomValues(new Uint8Array(length));
        let output = '';
        for (const byte of bytes) output += chars[byte % chars.length];
        return output;
      }

      async function sha256(plain) {
        return crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain));
      }

      function base64UrlEncode(buffer) {
        return btoa(String.fromCharCode(...new Uint8Array(buffer)))
          .replace(/\+/g, '-')
          .replace(/\//g, '_')
          .replace(/=+$/, '');
      }
    })();
  </script>
</body>
</html>
