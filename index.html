<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AdiBeat</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet">
    <style>
        :root {
            --bg-a: #1d102f;
            --bg-b: #07152f;
            --card: rgba(255,255,255,0.11);
            --card-strong: rgba(255,255,255,0.18);
            --text: #ffffff;
            --muted: rgba(255,255,255,0.72);
            --purple: #8B5CF6;
            --pink: #EC4899;
            --cyan: #22D3EE;
            --green: #34D399;
            --yellow: #FBBF24;
            --red: #FB7185;
            --dark: #111827;
            --radius-xl: 34px;
            --radius-lg: 24px;
            --shadow: 0 24px 70px rgba(0,0,0,0.38);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #121212;
            color: var(--text);
        }

        body {
            min-height: 100svh;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 15% 15%, rgba(236,72,153,0.34), transparent 34%),
                radial-gradient(circle at 85% 20%, rgba(34,211,238,0.28), transparent 32%),
                radial-gradient(circle at 50% 100%, rgba(139,92,246,0.34), transparent 34%),
                linear-gradient(135deg, var(--bg-a), var(--bg-b));
        }

        button {
            border: none;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
            font-weight: 900;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: transform 0.12s ease, filter 0.2s ease, box-shadow 0.2s ease, background 0.25s ease;
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
            transform: none;
        }

        .material-symbols-rounded {
            font-family: 'Material Symbols Rounded';
            font-weight: 700;
            font-style: normal;
            font-size: 1.5rem;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-flex;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
            font-feature-settings: 'liga';
        }

        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            padding: 24px;
            cursor: pointer;
            background:
                radial-gradient(circle at 25% 20%, rgba(255,255,255,0.22), transparent 24%),
                linear-gradient(135deg, #7C3AED, #DB2777 58%, #0891B2);
            transition: opacity 0.45s ease;
        }

        #splash-screen h1 {
            font-size: clamp(3.4rem, 14vw, 7rem);
            line-height: 0.9;
            letter-spacing: -0.08em;
            text-shadow: 0 20px 40px rgba(0,0,0,0.28);
        }

        #splash-hint {
            padding: 12px 20px;
            border-radius: 999px;
            background: rgba(255,255,255,0.16);
            color: rgba(255,255,255,0.86);
            font-weight: 700;
            animation: pulse 1.6s ease-in-out infinite;
        }

        #main-screen {
            width: 100%;
            height: 100svh;
            display: none;
            opacity: 0;
            flex-direction: column;
            gap: 12px;
            padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
            transition: opacity 0.35s ease;
        }

        .top-bar {
            width: 100%;
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 8px;
            align-items: center;
            min-height: 44px;
        }

        .brand {
            font-size: clamp(1.15rem, 4.6vw, 1.8rem);
            font-weight: 900;
            letter-spacing: -0.06em;
            white-space: nowrap;
        }

        #playlist-label {
            min-width: 0;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.16);
            color: rgba(255,255,255,0.88);
            font-size: clamp(0.76rem, 2.5vw, 0.95rem);
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .icon-btn {
            width: 42px;
            height: 40px;
            border-radius: 999px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 10px 25px rgba(0,0,0,0.16);
            font-size: 1.05rem;
        }

        #btn-settings {
            background: linear-gradient(135deg, rgba(34,211,238,0.95), rgba(139,92,246,0.95));
        }

        #btn-fullscreen {
            background: linear-gradient(135deg, rgba(251,191,36,0.95), rgba(236,72,153,0.92));
        }

        #idle-dimmer {
            position: fixed;
            inset: 0;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            background: rgba(0,0,0,0.52);
            transition: opacity 0.55s ease;
        }

        body.is-idle-dim #idle-dimmer {
            opacity: 1;
        }

        body.is-idle-dim #main-screen {
            filter: brightness(0.62) saturate(0.82);
        }

        #error-disclaimer {
            display: none;
            width: 100%;
            padding: 10px 14px;
            border-radius: var(--radius-lg);
            background: rgba(251,113,133,0.18);
            border: 1px solid rgba(251,113,133,0.36);
            color: #ffe3e9;
            font-weight: 800;
            text-align: center;
            font-size: clamp(0.78rem, 3.1vw, 0.98rem);
        }

        #btn-login {
            width: min(92vw, 520px);
            min-height: 78px;
            border-radius: 999px;
            background: linear-gradient(135deg, #22C55E, #A3E635);
            color: #102019;
            box-shadow: var(--shadow);
            font-size: clamp(1.15rem, 5vw, 1.8rem);
            align-self: center;
            margin: auto 0;
        }

        .game-area {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        #btn-play {
            display: none;
            flex: 1;
            width: 100%;
            min-height: 0;
            border-radius: var(--radius-xl);
            padding: clamp(18px, 4vw, 34px);
            flex-direction: column;
            gap: clamp(8px, 2.2vw, 16px);
            background:
                radial-gradient(circle at 20% 12%, rgba(255,255,255,0.30), transparent 26%),
                linear-gradient(135deg, #8B5CF6, #EC4899 55%, #F97316);
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.20);
            overflow: hidden;
            position: relative;
        }

        #btn-play::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 50% 40%, rgba(255,255,255,0.10), transparent 38%),
                linear-gradient(180deg, rgba(3,7,18,0.04), rgba(3,7,18,0.32));
            transition: opacity 0.28s ease;
        }

        #btn-play.state-revealed::before {
            opacity: 1;
        }

        #btn-play::after {
            content: "";
            position: absolute;
            inset: -45%;
            z-index: 2;
            background: linear-gradient(115deg, transparent 38%, rgba(255,255,255,0.13), transparent 62%);
            transform: translateX(-35%) rotate(12deg);
            pointer-events: none;
        }

        #main-album-art {
            position: absolute;
            inset: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            pointer-events: none;
            filter: blur(26px) saturate(1.85) brightness(0.96) contrast(1.12);
            transform: scale(1.16);
            transition: opacity 0.28s ease, filter 0.34s ease, transform 0.34s ease;
        }

        #btn-play.state-revealed #main-album-art {
            opacity: 0.98;
        }

        #btn-play.state-revealed.album-clear #main-album-art {
            filter: blur(0) saturate(1.16) brightness(0.84) contrast(1.05);
            transform: scale(1.02);
        }

        #btn-play.state-loading {
            background:
                radial-gradient(circle at 20% 12%, rgba(255,255,255,0.24), transparent 26%),
                linear-gradient(135deg, #2563EB, #7C3AED);
        }

        #btn-play.state-playing {
            background:
                radial-gradient(circle at 20% 12%, rgba(255,255,255,0.30), transparent 26%),
                linear-gradient(135deg, #06B6D4, #8B5CF6 48%, #EC4899);
        }

        #btn-play.state-timeout {
            animation: urgentPulse 0.9s ease-in-out infinite alternate;
            background:
                radial-gradient(circle at 20% 12%, rgba(255,255,255,0.25), transparent 26%),
                linear-gradient(135deg, #FB7185, #F97316 55%, #FBBF24);
            color: #1f1020;
        }

        #btn-play.state-revealed {
            background:
                radial-gradient(circle at 20% 12%, rgba(255,255,255,0.18), transparent 26%),
                linear-gradient(135deg, #111827, #2d1b69 52%, #481a56);
            border-color: rgba(255,255,255,0.16);
        }

        #play-kicker {
            position: relative;
            z-index: 3;
            font-size: clamp(0.8rem, 2.7vw, 1rem);
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.72);
        }

        #play-text {
            position: relative;
            z-index: 3;
            max-width: 100%;
            font-size: clamp(2.5rem, 13vw, 7rem);
            line-height: 0.88;
            letter-spacing: -0.08em;
            text-transform: uppercase;
            text-wrap: balance;
        }

        #timer-text {
            position: relative;
            z-index: 3;
            display: none;
            min-width: 96px;
            height: clamp(64px, 16vw, 118px);
            padding: 0 clamp(20px, 5vw, 42px);
            border-radius: 999px;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.26);
            border: 1px solid rgba(255,255,255,0.20);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.18);
            font-size: clamp(2.7rem, 12vw, 6rem);
            letter-spacing: -0.06em;
        }

        #btn-play.state-revealed #play-kicker,
        #btn-play.state-revealed #play-text {
            display: none;
        }

        #revealed-info {
            position: absolute;
            z-index: 4;
            left: clamp(14px, 3.4vw, 30px);
            right: clamp(14px, 3.4vw, 30px);
            bottom: clamp(14px, 3.4vw, 30px);
            display: none;
            padding: clamp(14px, 3.2vw, 24px) clamp(72px, 12vw, 104px) clamp(14px, 3.2vw, 24px) clamp(16px, 3.4vw, 28px);
            border-radius: var(--radius-lg);
            background: rgba(5,10,22,0.58);
            border: 1px solid rgba(255,255,255,0.24);
            backdrop-filter: blur(20px) saturate(1.45);
            -webkit-backdrop-filter: blur(20px) saturate(1.45);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.18),
                0 22px 52px rgba(0,0,0,0.38);
        }

        .reveal-layout {
            display: grid;
            grid-template-columns: 1fr;
            align-items: end;
            justify-items: start;
            text-align: left;
        }

        .reveal-copy {
            min-width: 0;
            width: 100%;
        }

        #track-name-main {
            font-size: clamp(1.65rem, 7.4vw, 4.35rem);
            line-height: 0.96;
            letter-spacing: -0.065em;
            color: #ffffff;
            background: linear-gradient(92deg, #ffffff 0%, #fde68a 46%, #7dd3fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-transform: none;
            overflow-wrap: anywhere;
            text-shadow: 0 10px 28px rgba(0,0,0,0.42);
        }

        #track-artist-main {
            font-size: clamp(1.02rem, 4.35vw, 2.25rem);
            line-height: 1.05;
            color: #C4B5FD;
            text-transform: none;
            overflow-wrap: anywhere;
            text-shadow: 0 8px 22px rgba(0,0,0,0.54);
        }

        #next-icon {
            position: absolute;
            z-index: 5;
            right: clamp(22px, 5vw, 44px);
            bottom: clamp(22px, 5vw, 44px);
            width: clamp(42px, 10vw, 60px);
            height: clamp(42px, 10vw, 60px);
            border-radius: 999px;
            align-items: center;
            justify-content: center;
            display: none;
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.24);
            color: rgba(255,255,255,0.94);
            box-shadow: 0 14px 34px rgba(0,0,0,0.32);
            backdrop-filter: blur(14px) saturate(1.4);
            -webkit-backdrop-filter: blur(14px) saturate(1.4);
            font-size: clamp(1.7rem, 6vw, 2.4rem);
        }

        #btn-play.state-revealed #next-icon {
            display: flex;
        }

        #trivia-panel {
            display: none;
            width: 100%;
            grid-template-columns: 1fr;
            gap: clamp(8px, 2.4vw, 14px);
            align-items: stretch;
        }

        .trivia-btn {
            position: relative;
            isolation: isolate;
            width: 100%;
            min-height: clamp(70px, 13svh, 104px);
            border-radius: var(--radius-lg);
            padding: clamp(14px, 3.4vw, 22px) clamp(18px, 4vw, 28px);
            flex-direction: row;
            gap: 14px;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.20);
            box-shadow: 0 14px 32px rgba(0,0,0,0.22);
            overflow: hidden;
        }

        .trivia-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(circle at 10% 0%, rgba(255,255,255,0.18), transparent 34%),
                linear-gradient(90deg, rgba(0,0,0,0.04), rgba(0,0,0,0.32));
            pointer-events: none;
        }

        #btn-release {
            background:
                radial-gradient(circle at 18% 12%, rgba(255,255,255,0.24), transparent 32%),
                linear-gradient(135deg, rgba(34,211,238,0.86), rgba(139,92,246,0.74));
        }

        #btn-album {
            background:
                radial-gradient(circle at 18% 12%, rgba(255,255,255,0.22), transparent 32%),
                linear-gradient(135deg, rgba(251,191,36,0.78), rgba(236,72,153,0.70));
        }

        #btn-original {
            background:
                radial-gradient(circle at 18% 12%, rgba(255,255,255,0.24), transparent 32%),
                linear-gradient(135deg, rgba(52,211,153,0.82), rgba(34,211,238,0.76));
        }

        .trivia-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            grid-template-rows: auto auto;
            column-gap: 12px;
            row-gap: 4px;
            align-items: center;
            text-align: left;
            text-shadow: 0 4px 18px rgba(0,0,0,0.48);
        }

        .trivia-label {
            grid-column: 1;
            grid-row: 1;
            font-size: clamp(1.02rem, 4vw, 1.6rem);
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            color: #ffffff;
        }

        .trivia-hint {
            grid-column: 1;
            grid-row: 2;
            font-size: clamp(0.72rem, 2.65vw, 0.98rem);
            line-height: 1.05;
            color: rgba(255,255,255,0.76);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .trivia-answer {
            grid-column: 2;
            grid-row: 1 / span 2;
            display: none;
            max-width: min(58vw, 520px);
            padding: 9px 13px;
            border-radius: 999px;
            background: rgba(0,0,0,0.30);
            border: 1px solid rgba(255,255,255,0.18);
            font-size: clamp(1.05rem, 4.4vw, 1.85rem);
            line-height: 1.05;
            color: rgba(255,255,255,0.98);
            text-transform: none;
            overflow-wrap: anywhere;
            text-align: right;
        }

        .trivia-btn.is-open .trivia-hint {
            display: none;
        }

        .trivia-btn.is-open .trivia-answer {
            display: block;
        }

        .loading-note {
            display: none;
            align-self: center;
            margin: auto 0;
            width: min(92vw, 560px);
            padding: 22px;
            border-radius: var(--radius-lg);
            background: rgba(255,255,255,0.11);
            border: 1px solid rgba(255,255,255,0.16);
            text-align: center;
            color: rgba(255,255,255,0.82);
            font-weight: 800;
        }


        .settings-modal {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: none;
            align-items: center;
            justify-content: center;
            padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
            background: rgba(3,7,18,0.62);
            backdrop-filter: blur(18px) saturate(1.25);
            -webkit-backdrop-filter: blur(18px) saturate(1.25);
        }

        .settings-modal.is-open {
            display: flex;
        }

        .settings-card {
            width: min(94vw, 640px);
            max-height: min(88svh, 760px);
            overflow: auto;
            border-radius: var(--radius-xl);
            padding: clamp(18px, 4vw, 28px);
            background:
                radial-gradient(circle at 12% 0%, rgba(255,255,255,0.14), transparent 30%),
                linear-gradient(145deg, rgba(15,23,42,0.92), rgba(49,27,87,0.92));
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: 0 28px 90px rgba(0,0,0,0.52);
        }

        .settings-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .settings-title {
            font-size: clamp(1.35rem, 5.5vw, 2.1rem);
            font-weight: 900;
            letter-spacing: -0.06em;
        }

        .settings-close {
            width: 42px;
            height: 42px;
            border-radius: 999px;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.18);
        }

        .settings-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 16px;
        }

        .settings-section-title {
            font-size: 0.82rem;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.66);
        }

        .mode-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .mode-btn,
        .settings-action,
        #btn-add-playlist {
            width: 100%;
            min-height: 58px;
            border-radius: 20px;
            padding: 13px 16px;
            justify-content: space-between;
            text-align: left;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.16);
            box-shadow: 0 12px 28px rgba(0,0,0,0.22);
        }

        .mode-btn.is-active {
            background: linear-gradient(135deg, rgba(34,211,238,0.92), rgba(139,92,246,0.88));
            border-color: rgba(255,255,255,0.30);
        }

        .mode-btn:disabled {
            opacity: 0.42;
        }

        .mode-copy {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }

        .mode-name {
            font-size: 1.02rem;
            font-weight: 900;
        }

        .mode-description {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.72);
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mode-check {
            opacity: 0;
            font-size: 1.45rem;
        }

        .mode-btn.is-active .mode-check {
            opacity: 1;
        }

        .playlist-input-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        #custom-playlist-input {
            width: 100%;
            min-height: 54px;
            border-radius: 18px;
            padding: 0 16px;
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(255,255,255,0.10);
            color: #ffffff;
            outline: none;
            font-size: 1rem;
            font-weight: 800;
        }

        #custom-playlist-input::placeholder {
            color: rgba(255,255,255,0.45);
        }

        #btn-add-playlist {
            background: linear-gradient(135deg, rgba(52,211,153,0.88), rgba(34,211,238,0.82));
        }

        .settings-action.danger {
            background: rgba(251,113,133,0.18);
            border-color: rgba(251,113,133,0.32);
        }

        #settings-status {
            min-height: 20px;
            color: rgba(255,255,255,0.76);
            font-size: 0.86rem;
            font-weight: 800;
            line-height: 1.25;
        }

        @media (orientation: landscape) {
            #main-screen {
                gap: 10px;
            }

            #btn-play {
                min-height: 0;
            }

            #trivia-panel {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            #trivia-panel.has-context {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }
        }

        @media (max-width: 560px) and (orientation: portrait) {
            .reveal-layout {
                grid-template-columns: 1fr;
                justify-items: center;
            }

            .reveal-copy {
                width: 100%;
            }
        }

            if ('serviceWorker' in navigator && (window.location.protocol === 'https:' || ['localhost', '127.0.0.1'].includes(window.location.hostname))) {

        document.addEventListener("DOMContentLoaded", () => {

            /*

            localStorage.removeItem('adibeat_playlist_index');

            let customPlaylist = leerPlaylistPersonalizada();

            if (currentGameModeId === 'custom' && !customPlaylist) currentGameModeId = 'normal';
            localStorage.setItem(MODE_STORAGE_KEY, currentGameModeId);

            let playlistTracks = [];

            const trackNameMain = document.getElementById("track-name-main");
            const trackArtistMain = document.getElementById("track-artist-main");
            const playlistLabel = document.getElementById("playlist-label");
            const errorDisclaimer = document.getElementById("error-disclaimer");
            const loadingNote = document.getElementById("loading-note");
            const triviaPanel = document.getElementById("trivia-panel");

            const btnAlbum = document.getElementById("btn-album");

            const answerAlbum = document.getElementById("answer-album");
            const answerOriginal = document.getElementById("answer-original");
            const releaseLabel = btnRelease.querySelector('.trivia-label');
            const releaseHint = btnRelease.querySelector('.trivia-hint');
            const albumLabel = btnAlbum.querySelector('.trivia-label');
            const albumHint = btnAlbum.querySelector('.trivia-hint');

            const btnCloseSettings = document.getElementById("btn-close-settings");
            const modeButtons = Array.from(document.querySelectorAll(".mode-btn"));
            const customModeDescription = document.getElementById("custom-mode-description");
            const customPlaylistInput = document.getElementById("custom-playlist-input");
            const btnAddPlaylist = document.getElementById("btn-add-playlist");
            const btnForceDevice = document.getElementById("btn-force-device");
            const btnReconnectAccount = document.getElementById("btn-reconnect-account");
            const settingsStatus = document.getElementById("settings-status");

            splashScreen.addEventListener('click', () => {
                playStartSound();
                registrarActividadUsuario();
                activarPantallaActiva();
                intentarPantallaCompleta();
                splashScreen.style.opacity = "0";
                setTimeout(() => {
                    splashScreen.style.display = "none";
                    mainScreen.style.display = "flex";
                    setTimeout(() => mainScreen.style.opacity = "1", 30);
                }, 450);
            });

            iniciarSensorDeInactividad();
            document.addEventListener('fullscreenchange', actualizarIconoPantallaCompleta);
            document.addEventListener('webkitfullscreenchange', actualizarIconoPantallaCompleta);
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible') {
                    registrarActividadUsuario();
                    if (wakeLockWanted) activarPantallaActiva();
                }
            });

            function iniciarSensorDeInactividad() {
                const eventos = ['pointerdown', 'pointermove', 'touchstart', 'keydown', 'click'];
                eventos.forEach(evento => {
                    window.addEventListener(evento, registrarActividadUsuario, { passive: true });
                });
                registrarActividadUsuario();
            }

            function registrarActividadUsuario() {
                document.body.classList.remove('is-idle-dim');
                if (idleDimTimer) clearTimeout(idleDimTimer);
                idleDimTimer = setTimeout(() => {
                    document.body.classList.add('is-idle-dim');
                }, IDLE_DIM_DELAY_MS);
            }

            async function alternarPantallaCompleta() {
                if (estaEnPantallaCompleta()) {
                    await salirPantallaCompleta();
                } else {
                    await intentarPantallaCompleta(true);
                }
                actualizarIconoPantallaCompleta();
            }

            function estaEnPantallaCompleta() {
                return Boolean(document.fullscreenElement || document.webkitFullscreenElement);
            }

            async function intentarPantallaCompleta(silencioso = false) {
                try {
                    const root = document.documentElement;
                    if (estaEnPantallaCompleta()) return true;
                    if (root.requestFullscreen) {
                        await root.requestFullscreen();
                        return true;
                    }
                    if (root.webkitRequestFullscreen) {
                        root.webkitRequestFullscreen();
                        return true;
                    }
                } catch (error) {
                    if (!silencioso) console.warn('No se pudo activar pantalla completa:', error);
                }
                return false;
            }

            async function salirPantallaCompleta() {
                try {
                    if (document.exitFullscreen) {
                        await document.exitFullscreen();
                        return;
                    }
                    if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    }
                } catch (error) {
                    console.warn('No se pudo salir de pantalla completa:', error);
                }
            }

            function actualizarIconoPantallaCompleta() {
                if (!fullscreenIcon) return;
                fullscreenIcon.textContent = estaEnPantallaCompleta() ? 'fullscreen_exit' : 'fullscreen';
            }

            async function activarPantallaActiva(mostrarEstado = false) {
                wakeLockWanted = true;

                if (!('wakeLock' in navigator)) {
                    if (mostrarEstado) setSettingsStatus('Este navegador no soporta bloqueo de pantalla activa. Instalada como PWA aún puede reducir barras, pero el sistema podría apagar la pantalla.');
                    return false;
                }

                try {
                    if (wakeLockSentinel && !wakeLockSentinel.released) return true;

                    wakeLockSentinel = await navigator.wakeLock.request('screen');
                    wakeLockSentinel.addEventListener('release', () => {
                        wakeLockSentinel = null;
                    });

                    if (mostrarEstado) setSettingsStatus('Pantalla activa: no debería apagarse automáticamente. Dimming interno después de 30 segundos.');
                    return true;
                } catch (error) {
                    if (mostrarEstado) setSettingsStatus(`No pude bloquear la suspensión de pantalla: ${error?.message || error}`);
                    return false;
                }
            }

            function playStartSound() {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();

                    osc.type = 'square';
                    osc.connect(gain);
                    gain.connect(ctx.destination);

                    osc.frequency.setValueAtTime(280, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(720, ctx.currentTime + 0.08);
                    osc.frequency.exponentialRampToValueAtTime(520, ctx.currentTime + 0.18);

                    gain.gain.setValueAtTime(0.08, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.26);

                    osc.start();
                    osc.stop(ctx.currentTime + 0.26);
                } catch(e) {}
            }

            const generateRandomString = (length) => {
                const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                const values = crypto.getRandomValues(new Uint8Array(length));
                return Object.values(values).reduce((acc, x) => acc + possible[x % possible.length], "");
            };

            const sha256 = async (plain) => {
                const encoder = new TextEncoder();
                const data = encoder.encode(plain);
                return window.crypto.subtle.digest('SHA-256', data);
            };

            const base64encode = (input) => {
                return btoa(String.fromCharCode(...new Uint8Array(input)))
                    .replace(/=/g, '')
                    .replace(/\+/g, '-')
                    .replace(/\//g, '_');
            };

            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code && !accessToken) {
                const codeVerifier = localStorage.getItem('code_verifier');
                fetch("https://accounts.spotify.com/api/token", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        code_verifier: codeVerifier,
                    })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.access_token) {
                        accessToken = data.access_token;
                        localStorage.setItem('adibeat_token', accessToken);
                        window.history.replaceState({}, document.title, window.location.pathname);
                        iniciarApp();
                    } else {
                        showLogin("No se pudo completar la conexión con Spotify.");
                    }
                })
                .catch(() => showLogin("Falló la conexión con Spotify."));
            } else {
                iniciarApp();
            }

            btnLogin.addEventListener('click', iniciarLoginSpotify);

            btnSettings.addEventListener('click', openSettings);
            btnFullscreen.addEventListener('click', async () => {
                registrarActividadUsuario();
                await alternarPantallaCompleta();
                await activarPantallaActiva(true);
            });
            btnCloseSettings.addEventListener('click', closeSettings);
            settingsModal.addEventListener('click', (event) => {
                if (event.target === settingsModal) closeSettings();
            });

            modeButtons.forEach(button => {
                button.addEventListener('click', async () => {
                    const modeId = button.dataset.mode;
                    if (!modeId || button.disabled || !accessToken) return;
                    currentGameModeId = modeId;
                    localStorage.setItem(MODE_STORAGE_KEY, currentGameModeId);
                    setSettingsStatus(`Modo seleccionado: ${getModeById(modeId).label}`);
                    resetRoundUi();
                    await cargarModo(currentGameModeId);
                });
            });

            btnAddPlaylist.addEventListener('click', async () => {
                if (!accessToken) {
                    setSettingsStatus('Conecta Spotify antes de agregar una playlist.');
                    return;
                }

                const playlistId = extraerPlaylistId(customPlaylistInput.value);
                if (!playlistId) {
                    setSettingsStatus('Pega una URL o ID válido de playlist de Spotify.');
                    return;
                }

                btnAddPlaylist.disabled = true;
                setSettingsStatus('Leyendo playlist…');

                try {
                    const data = await spotifyJson(`https://api.spotify.com/v1/playlists/${playlistId}`);
                    customPlaylist = {
                        id: playlistId,
                        label: data?.name || 'Playlist personalizada'
                    };
                    localStorage.setItem(CUSTOM_PLAYLIST_KEY, JSON.stringify(customPlaylist));
                    currentGameModeId = 'custom';
                    localStorage.setItem(MODE_STORAGE_KEY, currentGameModeId);
                    customPlaylistInput.value = '';
                    updateSettingsUi();
                    setSettingsStatus(`Playlist agregada: ${customPlaylist.label}`);
                    await cargarModo(currentGameModeId);
                } catch (error) {
                    setSettingsStatus(`No pude agregar esa playlist. ${mensajeSpotify(error)}`);
                } finally {
                    btnAddPlaylist.disabled = false;
                }
            });

            btnForceDevice.addEventListener('click', async () => {
                if (!accessToken) {
                    setSettingsStatus('Spotify no está conectado.');
                    return;
                }

                localStorage.removeItem(DEVICE_CACHE_KEY);
                lastPlaybackDeviceId = '';
                btnForceDevice.disabled = true;

                try {
                    const device = await resolverDispositivoSpotify(true);
                    setSettingsStatus(`Dispositivo listo: ${device?.name || 'Spotify Connect'}`);
                } catch (error) {
                    setSettingsStatus(mensajeSpotify(error));
                } finally {
                    btnForceDevice.disabled = false;
                }
            });

            btnReconnectAccount.addEventListener('click', () => {
                localStorage.removeItem('adibeat_token');
                localStorage.removeItem('code_verifier');
                localStorage.removeItem(DEVICE_CACHE_KEY);
                accessToken = '';
                closeSettings();
                iniciarLoginSpotify();
            });

            btnPlay.addEventListener('click', () => {
                if (playlistTracks.length === 0) return;

                if (gameState === 'SESSION_DONE') {
                    reiniciarSesion();
                    return;
                }

                if (gameState === 'IDLE' || gameState === 'REVEALED') {
                    iniciarRonda();
                    return;
                }

                if (gameState === 'PLAYING') {
                    revelarInformacion();
                    return;
                }

                if (gameState === 'TIMEOUT') {
                    revelarInformacion();
                }
            });

                if (!esCancionBlueCover(currentTrackObj)) {
                    btnPlay.classList.add('album-clear');
                }
            });

                if (!currentTrackObj?.originalArtist) return;
                btnOriginal.classList.add('is-open');
            });

            function iniciarApp() {
                updateSettingsUi();
                if (accessToken) {
                    btnLogin.style.display = 'none';
                    cargarModo(currentGameModeId);
                } else {
                    showLogin();
                }
            }

            async function iniciarLoginSpotify() {
                const codeVerifier = generateRandomString(64);
                localStorage.setItem('code_verifier', codeVerifier);
                const codeChallenge = base64encode(await sha256(codeVerifier));

                const authUrl = new URL("https://accounts.spotify.com/authorize");
                authUrl.search = new URLSearchParams({
                    client_id: CLIENT_ID,
                    response_type: 'code',
                    redirect_uri: REDIRECT_URI,
                    scope: SCOPES,
                    code_challenge_method: 'S256',
                    code_challenge: codeChallenge,
                    show_dialog: 'true'
                }).toString();

                window.location.href = authUrl.toString();
            }

            async function cargarModo(modeId) {
                const mode = getModeById(modeId);
                const sources = obtenerFuentesModo(mode);

                if (sources.length === 0) {
                    currentGameModeId = 'normal';
                    localStorage.setItem(MODE_STORAGE_KEY, currentGameModeId);
                    return cargarModo(currentGameModeId);
                }

                playlistTracks = [];
                sessionQueue = [];
                playedTrackUris = new Set();
                currentTrackObj = null;

                hideError();
                updateSettingsUi();
                btnPlay.style.display = 'none';
                triviaPanel.style.display = 'none';
                loadingNote.style.display = 'block';
                playlistLabel.textContent = `Modo: ${mode.label}`;
                setSettingsControlsDisabled(true);

                try {
                    await cargarBaseArtistasOriginales();

                    // Conserva el pre-chequeo de usuario que tenía tu versión funcional.
                    await spotifyJson('https://api.spotify.com/v1/me');

                    const collectedTracks = [];
                    const loadedNames = [];

                    for (const source of sources) {
                        // Conserva la lectura explícita de metadata de playlist.
                        const playlistData = await spotifyJson(`https://api.spotify.com/v1/playlists/${source.id}`);
                        const playlistName = playlistData?.name || source.label;
                        loadedNames.push(playlistName);

                        const items = await cargarItemsPlaylist(source.id);
                        collectedTracks.push(...procesarCanciones(items, playlistName, source.sourceKey));
                    }

                    playlistTracks = deduplicarCanciones(collectedTracks);
                    prepararSesionSinRepeticiones();

                    if (playlistTracks.length === 0) {
                        throw new Error('La playlist se pudo leer, pero no tiene tracks reproducibles.');
                    }

                    loadingNote.style.display = 'none';
                    btnPlay.style.display = 'flex';
                    playlistLabel.textContent = `Modo: ${mode.label} · ${playlistTracks.length} canciones`;
                    resetRoundUi();
                } catch (error) {
                    loadingNote.style.display = 'none';
                    btnPlay.style.display = 'none';
                    playlistTracks = [];
                    showError(`No pude recuperar canciones del modo "${mode.label}". ${mensajeSpotify(error)}`);
                } finally {
                    setSettingsControlsDisabled(false);
                    updateSettingsUi();
                }
            }

            async function cargarItemsPlaylist(playlistId) {
                const items = [];
                let nextUrl = `https://api.spotify.com/v1/playlists/${playlistId}/items?limit=50`;
                let safety = 0;

                while (nextUrl && safety < 30) {
                    const data = await spotifyJson(nextUrl);
                    if (Array.isArray(data.items)) items.push(...data.items);
                    nextUrl = data.next;
                    safety++;
                }

                return items;
            }

            async function spotifyJson(url, options = {}) {
                const response = await spotifyRequest(url, options);
                if (response.status === 204) return {};
                return response.json();
            }

            async function spotifyCommand(url, options = {}) {
                const response = await spotifyRequest(url, options);
                if (response.status === 204) return {};

                try {
                    return await response.json();
                } catch(e) {
                    return {};
                }
            }

            async function spotifyRequest(url, options = {}) {
                const response = await fetch(url, {
                    ...options,
                    headers: {
                        ...(options.headers || {}),
                        'Authorization': `Bearer ${accessToken}`
                    }
                });

                if (response.status === 401) {
                    localStorage.removeItem('adibeat_token');
                    accessToken = '';
                    showLogin("La sesión de Spotify expiró. Reconecta.");
                    throw crearSpotifyError(response.status, 'Sesión expirada.', url);
                }

                if (!response.ok) {
                    let detail = '';
                    try {
                        const data = await response.json();
                        detail = data?.error?.message || data?.error?.reason || JSON.stringify(data);
                    } catch(e) {}
                    throw crearSpotifyError(response.status, detail, url);
                }

                return response;
            }

            function crearSpotifyError(status, detail, url = '') {
                const cleanDetail = detail || 'Error de Spotify sin detalle.';
                const error = new Error(`${status}${cleanDetail ? `: ${cleanDetail}` : ''}`);
                error.status = status;
                error.detail = cleanDetail;
                error.url = url;
                return error;
            }


            async function cargarBaseArtistasOriginales(forceReload = false) {
                if (originalArtistDbLoaded && !forceReload) return;

                originalArtistDbLoaded = true;
                originalArtistDb = new Map();

                try {
                    const url = `${ORIGINAL_ARTIST_DB_URL}?v=${Date.now()}`;
                    const response = await fetch(url, { cache: 'no-store' });

                    if (!response.ok) {
                        if (response.status !== 404) {
                            console.warn(`No pude leer ${ORIGINAL_ARTIST_DB_URL}: ${response.status}`);
                        }
                        return;
                    }

                    const data = await response.json();
                    const tracks = Array.isArray(data?.tracks)
                        ? data.tracks
                        : Array.isArray(data)
                            ? data
                            : [];

                    for (const entry of tracks) {
                        const answer = String(entry?.answer || entry?.originalArtist || '').trim();
                        if (!answer) continue;

                        const spotifyId = extraerTrackId(entry?.spotifyId || entry?.id || entry?.uri || '');
                        const uri = entry?.uri || (spotifyId ? `spotify:track:${spotifyId}` : '');

                        if (spotifyId) originalArtistDb.set(spotifyId, answer);
                        if (uri) originalArtistDb.set(uri, answer);
                    }
                } catch (error) {
                    console.warn(`No pude cargar ${ORIGINAL_ARTIST_DB_URL}`, error);
                }
            }

            function extraerTrackId(value) {
                const clean = String(value || '').trim();
                if (!clean) return '';

                const uriMatch = clean.match(/^spotify:track:([A-Za-z0-9]+)$/i);
                if (uriMatch) return uriMatch[1];

                const urlMatch = clean.match(/open\.spotify\.com\/track\/([A-Za-z0-9]+)/i);
                if (urlMatch) return urlMatch[1];

                const rawMatch = clean.match(/^[A-Za-z0-9]{16,}$/);
                return rawMatch ? clean : '';
            }

            function buscarArtistaOriginal(trackId, uri) {
                const id = extraerTrackId(trackId || uri || '');
                return originalArtistDb.get(id) || originalArtistDb.get(uri) || '';
            }

            function getModeById(modeId) {
                return GAME_MODES.find(mode => mode.id === modeId) || GAME_MODES[0];
            }

            function obtenerFuentesModo(mode) {
                return mode.sources
                    .map(sourceKey => {
                        if (sourceKey === 'custom') {
                            return customPlaylist ? { ...customPlaylist, sourceKey: 'custom' } : null;
                        }
                        const source = PLAYLIST_SOURCES[sourceKey];
                        return source ? { ...source, sourceKey } : null;
                    })
                    .filter(Boolean);
            }

            function leerPlaylistPersonalizada() {
                try {
                    const raw = localStorage.getItem(CUSTOM_PLAYLIST_KEY);
                    if (!raw) return null;
                    const parsed = JSON.parse(raw);
                    if (!parsed?.id) return null;
                    return {
                        id: parsed.id,
                        label: parsed.label || 'Playlist personalizada'
                    };
                } catch(e) {
                    return null;
                }
            }

            function extraerPlaylistId(value) {
                const clean = String(value || '').trim();
                if (!clean) return '';

                const uriMatch = clean.match(/^spotify:playlist:([A-Za-z0-9]+)$/i);
                if (uriMatch) return uriMatch[1];

                const urlMatch = clean.match(/open\.spotify\.com\/playlist\/([A-Za-z0-9]+)/i);
                if (urlMatch) return urlMatch[1];

                const rawMatch = clean.match(/^[A-Za-z0-9]{16,}$/);
                return rawMatch ? clean : '';
            }

            function deduplicarCanciones(tracks) {
                const seen = new Set();
                const unique = [];

                for (const track of tracks) {
                    if (!track?.uri || seen.has(track.uri)) continue;
                    seen.add(track.uri);
                    unique.push(track);
                }

                return unique;
            }

            function updateSettingsUi() {
                const hasCustom = Boolean(customPlaylist?.id);
                const activeMode = getModeById(currentGameModeId);

                if (currentGameModeId === 'custom' && !hasCustom) {
                    currentGameModeId = 'normal';
                    localStorage.setItem(MODE_STORAGE_KEY, currentGameModeId);
                }

                customModeDescription.textContent = hasCustom
                    ? customPlaylist.label
                    : 'Agrega una playlist para activar este modo';

                modeButtons.forEach(button => {
                    const modeId = button.dataset.mode;
                    const isCustomWithoutPlaylist = modeId === 'custom' && !hasCustom;
                    button.disabled = isCustomWithoutPlaylist;
                    button.classList.toggle('is-active', modeId === currentGameModeId);
                });

                if (!playlistTracks.length) {
                    playlistLabel.textContent = accessToken
                        ? `Modo: ${activeMode.label}`
                        : 'Spotify no conectado';
                }
            }

            function setSettingsControlsDisabled(disabled) {
                modeButtons.forEach(button => {
                    const isCustomWithoutPlaylist = button.dataset.mode === 'custom' && !customPlaylist;
                    button.disabled = disabled || isCustomWithoutPlaylist;
                });
                btnAddPlaylist.disabled = disabled;
                btnForceDevice.disabled = disabled;
            }

            function openSettings() {
                updateSettingsUi();
                settingsStatus.textContent = '';
                settingsModal.classList.add('is-open');
                settingsModal.setAttribute('aria-hidden', 'false');
            }

            function closeSettings() {
                settingsModal.classList.remove('is-open');
                settingsModal.setAttribute('aria-hidden', 'true');
            }

            function setSettingsStatus(message) {
                settingsStatus.textContent = message || '';
            }

            function procesarCanciones(itemsArray, sourceName = '', sourceKey = '') {
                return itemsArray.map(obj => {
                    const t = obj?.item || obj?.track;

                    if (!t || !t.uri || !t.uri.startsWith('spotify:track:')) return null;

                    const releaseRaw = t.album?.release_date || '';
                    const releasePrecision = t.album?.release_date_precision || '';
                    const albumName = t.album?.name || 'Sencillo / sin álbum';
                    const albumImages = Array.isArray(t.album?.images) ? t.album.images : [];
                    const albumArt = albumImages.find(img => img?.width >= 300)?.url || albumImages[0]?.url || '';

                    return {
                        uri: t.uri,
                        id: t.id || t.uri,
                        name: t.name || 'Desconocida',
                        artist: Array.isArray(t.artists) && t.artists.length
                            ? t.artists.map(a => a.name).join(', ')
                            : 'Artista desconocido',
                        album: albumName,
                        albumArt,
                        sourcePlaylist: sourceName,
                        sourceKey,
                        spotifyUrl: t.external_urls?.spotify || t.album?.external_urls?.spotify || '',
                        releaseDate: formatearFechaSpotify(releaseRaw, releasePrecision),
                        year: releaseRaw ? releaseRaw.substring(0, 4) : '????',
                        originalArtist: buscarArtistaOriginal(t.id, t.uri)
                    };
                }).filter(Boolean);
            }

            function prepararSesionSinRepeticiones() {
                playedTrackUris = new Set();
                sessionQueue = mezclarArray([...playlistTracks]);
            }

            function obtenerSiguienteCancion() {
                while (sessionQueue.length > 0) {
                    const nextTrack = sessionQueue.pop();
                    if (!playedTrackUris.has(nextTrack.uri)) return nextTrack;
                }

                return null;
            }

            function confirmarCancionUsada(track) {
                if (track?.uri) playedTrackUris.add(track.uri);
            }

            function devolverCancionALaBolsa(track) {
                if (track?.uri && !playedTrackUris.has(track.uri)) {
                    sessionQueue.push(track);
                }
            }

            function mezclarArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            function formatearFechaSpotify(value, precision) {
                if (!value) return 'Fecha no disponible';

                const parts = value.split('-');

                if (precision === 'year' || parts.length === 1) return parts[0];

                if (precision === 'month' || parts.length === 2) {
                    const [year, month] = parts;
                    return `${month}/${year}`;
                }

                if (parts.length === 3) {
                    const [year, month, day] = parts;
                    return `${day}/${month}/${year}`;
                }

                return value;
            }

            async function iniciarRonda() {
                if (playlistTracks.length === 0) return;

                clearTimers();
                hideError();
                hideTrivia();
                btnPlay.classList.remove('album-clear');

                currentTrackObj = obtenerSiguienteCancion();
                if (!currentTrackObj) {
                    gameState = 'SESSION_DONE';
                    setPlayButtonState('idle');
                    playKicker.textContent = 'Sesión completa';
                    playText.textContent = 'REINICIAR CICLO';
                    timerText.style.display = 'none';
                    revealedInfo.style.display = 'none';
                    mainAlbumArt.removeAttribute('src');
                    showError('Ya se usaron todas las canciones de esta lista. Toca REINICIAR CICLO para barajar de nuevo.');
                    return;
                }

                gameState = 'LOADING';
                setPlayButtonState('loading');
                playKicker.textContent = 'Preparando pista';
                playText.textContent = 'SINTONIZANDO…';
                timerText.style.display = 'none';
                revealedInfo.style.display = 'none';
                btnPlay.disabled = true;

                try {
                    await reproducirCancionEnSpotify(currentTrackObj);
                    confirmarCancionUsada(currentTrackObj);

                    btnPlay.disabled = false;
                    gameState = 'PLAYING';
                    setPlayButtonState('playing');
                    playKicker.textContent = 'Ronda activa';
                    playText.textContent = 'Adivina el Beat!!!';
                    timerText.style.display = 'flex';

                    let tiempo = COUNTDOWN_SECONDS;
                    timerText.textContent = tiempo;

                    intervalo = setInterval(() => {
                        tiempo -= 1;
                        timerText.textContent = tiempo;

                        if (tiempo <= 0) {
                            clearInterval(intervalo);
                            intervalo = null;
                        }
                    }, 1000);

                    temporizador = setTimeout(() => {
                        gameState = 'TIMEOUT';
                        setPlayButtonState('timeout');
                        playKicker.textContent = 'Tiempo agotado';
                        playText.textContent = 'ADIVINEN TODOS';
                        timerText.style.display = 'none';
                    }, COUNTDOWN_SECONDS * 1000);
                } catch (error) {
                    devolverCancionALaBolsa(currentTrackObj);
                    currentTrackObj = null;
                    btnPlay.disabled = false;
                    gameState = 'IDLE';
                    setPlayButtonState('idle');
                    playKicker.textContent = 'Juego listo';
                    playText.textContent = 'ADIVINA LA CANCIÓN';
                    timerText.style.display = 'none';
                    showError(`No pude iniciar la canción. ${mensajeSpotify(error)}`);
                }
            }

            async function reproducirCancionEnSpotify(track) {
                const device = await resolverDispositivoSpotify();
                const playUrl = new URL('https://api.spotify.com/v1/me/player/play');
                if (device?.id) playUrl.searchParams.set('device_id', device.id);

                const playOptions = {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uris: [track.uri],
                        position_ms: 0
                    })
                };

                try {
                    await spotifyCommand(playUrl.toString(), playOptions);
                    return;
                } catch (error) {
                    if (!esErrorDeDispositivoSpotify(error)) throw error;

                    localStorage.removeItem(DEVICE_CACHE_KEY);
                    lastPlaybackDeviceId = '';

                    const retryDevice = await resolverDispositivoSpotify(true);
                    if (!retryDevice?.id) throw error;

                    const retryUrl = new URL('https://api.spotify.com/v1/me/player/play');
                    retryUrl.searchParams.set('device_id', retryDevice.id);
                    await esperar(DEVICE_WAKE_DELAY_MS);
                    await spotifyCommand(retryUrl.toString(), playOptions);
                }
            }

            async function resolverDispositivoSpotify(forceRefresh = false) {
                const data = await spotifyJson('https://api.spotify.com/v1/me/player/devices');
                const devices = Array.isArray(data.devices) ? data.devices : [];
                const usableDevices = devices.filter(device => device?.id && !device.is_restricted);

                if (usableDevices.length === 0) {
                    throw crearSpotifyError(0, 'NO_SPOTIFY_DEVICE: Spotify está abierto, pero la API no reporta ningún dispositivo controlable. Reproduce cualquier canción manualmente una vez y vuelve a intentar.');
                }

                const activeDevice = usableDevices.find(device => device.is_active);
                const cachedDevice = !forceRefresh && lastPlaybackDeviceId
                    ? usableDevices.find(device => device.id === lastPlaybackDeviceId)
                    : null;
                const selectedDevice = activeDevice || cachedDevice || usableDevices[0];

                lastPlaybackDeviceId = selectedDevice.id;
                localStorage.setItem(DEVICE_CACHE_KEY, selectedDevice.id);

                if (!selectedDevice.is_active) {
                    await transferirPlaybackASpotify(selectedDevice.id);
                    await esperar(DEVICE_WAKE_DELAY_MS);
                }

                return selectedDevice;
            }

            async function transferirPlaybackASpotify(deviceId) {
                await spotifyCommand('https://api.spotify.com/v1/me/player', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        device_ids: [deviceId],
                        play: false
                    })
                });
            }

            function esErrorDeDispositivoSpotify(error) {
                const msg = `${error?.status || ''} ${error?.message || ''} ${error?.detail || ''}`.toLowerCase();
                return error?.status === 404
                    || msg.includes('no active')
                    || msg.includes('device')
                    || msg.includes('not found');
            }

            function esperar(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            function esCancionBlueCover(track) {
                if (!track) return false;
                return track.sourceKey === 'blue'
                    || String(track.sourcePlaylist || '').toLowerCase().includes('adibeat-blue');
            }

            function mostrarArteAlbumPrincipal(clear = false) {
                if (!currentTrackObj?.albumArt) {
                    mainAlbumArt.removeAttribute('src');
                    mainAlbumArt.alt = 'Arte del álbum no disponible';
                    return;
                }

                mainAlbumArt.src = currentTrackObj.albumArt;
                mainAlbumArt.alt = `Arte del álbum ${currentTrackObj.album}`;

                if (clear) {
                    btnPlay.classList.add('album-clear');
                }
            }

            function configurarTriviaParaRonda(isBlueCover, hasOriginalArtist) {
                btnRelease.classList.remove('is-open');
                btnAlbum.classList.remove('is-open');
                btnOriginal.classList.remove('is-open');
                btnOriginal.style.display = 'none';
                triviaPanel.classList.remove('has-context');

                if (isBlueCover) {
                    releaseLabel.textContent = 'Artista';
                    releaseHint.textContent = 'Toca para revelar arte y artista';
                    answerRelease.textContent = currentTrackObj.artist || 'Artista no disponible';

                    albumLabel.textContent = 'Artista Original';
                    albumHint.textContent = hasOriginalArtist
                        ? 'Toca para revelar'
                        : 'Sin dato en la base';
                    answerAlbum.textContent = hasOriginalArtist
                        ? currentTrackObj.originalArtist
                        : 'Sin dato';
                    btnAlbum.style.display = hasOriginalArtist ? 'flex' : 'none';
                    return;
                }

                releaseLabel.textContent = 'Década';
                releaseHint.textContent = 'Toca para revelar';
                answerRelease.textContent = currentTrackObj.year || 'Año no disponible';

                albumLabel.textContent = 'Álbum';
                albumHint.textContent = 'Toca para revelar';
                answerAlbum.textContent = currentTrackObj.album || 'Álbum no disponible';
                btnAlbum.style.display = 'flex';
            }

            function revelarInformacion() {
                if (!currentTrackObj) return;

                clearTimers();

                gameState = 'REVEALED';
                setPlayButtonState('revealed');

                playKicker.textContent = 'Respuesta';
                playText.textContent = '';
                timerText.style.display = 'none';

                const isBlueCover = esCancionBlueCover(currentTrackObj);
                const hasOriginalArtist = Boolean(currentTrackObj.originalArtist);

                trackNameMain.textContent = currentTrackObj.name;
                trackArtistMain.textContent = isBlueCover ? '' : currentTrackObj.artist;
                trackArtistMain.style.display = isBlueCover ? 'none' : 'block';

                revealedInfo.style.display = 'block';

                configurarTriviaParaRonda(isBlueCover, hasOriginalArtist);

                if (isBlueCover) {
                    mainAlbumArt.removeAttribute('src');
                    mainAlbumArt.alt = 'Arte del álbum oculto hasta revelar artista';
                    btnPlay.classList.remove('album-clear');
                } else {
                    mostrarArteAlbumPrincipal(false);
                }

                const restantes = Math.max(playlistTracks.length - playedTrackUris.size, 0);
                nextIcon.title = restantes > 0
                    ? `Siguiente canción · quedan ${restantes}`
                    : 'Lista completada en esta sesión';

                triviaPanel.style.display = 'grid';
            }

            function resetRoundUi() {
                clearTimers();
                hideTrivia();

                gameState = 'IDLE';
                btnPlay.disabled = false;
                btnPlay.classList.remove('album-clear');
                mainAlbumArt.removeAttribute('src');
                setPlayButtonState('idle');
                const restantes = Math.max(playlistTracks.length - playedTrackUris.size, 0);
                playKicker.textContent = `${restantes} de ${playlistTracks.length} canciones sin repetir`;
                playText.textContent = 'ADIVINA LA CANCIÓN';
                timerText.style.display = 'none';
                revealedInfo.style.display = 'none';
                trackArtistMain.style.display = 'block';
                btnAlbum.style.display = 'flex';
            }

            function hideTrivia() {
                triviaPanel.style.display = 'none';
                triviaPanel.classList.remove('has-context');
                btnRelease.classList.remove('is-open');
                btnAlbum.classList.remove('is-open');
                btnOriginal.classList.remove('is-open');
                btnOriginal.style.display = 'none';
                btnAlbum.style.display = 'flex';
                trackArtistMain.style.display = 'block';
                btnPlay.classList.remove('album-clear');
            }

            function reiniciarSesion() {
                if (playlistTracks.length === 0) return;
                prepararSesionSinRepeticiones();
                currentTrackObj = null;
                hideError();
                resetRoundUi();
            }

            function setPlayButtonState(stateName) {
                btnPlay.classList.remove('state-idle', 'state-loading', 'state-playing', 'state-timeout', 'state-revealed');
                btnPlay.classList.add(`state-${stateName}`);
            }

            function clearTimers() {
                if (intervalo) {
                    clearInterval(intervalo);
                    intervalo = null;
                }

                if (temporizador) {
                    clearTimeout(temporizador);
                    temporizador = null;
                }
            }

            function showLogin(message = '') {
                btnLogin.style.display = 'flex';
                btnPlay.style.display = 'none';
                loadingNote.style.display = 'none';
                triviaPanel.style.display = 'none';
                playlistLabel.textContent = 'Spotify no conectado';

                if (message) showError(message);
            }

            function showError(message) {
                errorDisclaimer.textContent = message;
                errorDisclaimer.style.display = 'block';
            }

            function hideError() {
                errorDisclaimer.textContent = '';
                errorDisclaimer.style.display = 'none';
            }

            function mensajeSpotify(error) {
                const msg = `${error?.status || ''} ${error?.message || ''} ${error?.detail || ''}`;
                const normalized = msg.toLowerCase();

                if (!msg.trim()) return '';
                if (normalized.includes('no_spotify_device')) return 'Spotify no reporta ningún dispositivo controlable. Aunque esté abierto, reproduce cualquier canción manualmente una vez para que Spotify Connect despierte.';
                if (normalized.includes('no active') || normalized.includes('device') || error?.status === 404) return 'Spotify está abierto, pero no está marcado como dispositivo activo/controlable. Intenté detectarlo y transferir playback automáticamente; si falla, reproduce una canción manualmente una vez y vuelve a tocar INICIAR.';
                if (normalized.includes('403')) return 'Puede ser cuenta sin Premium, dispositivo restringido o permiso insuficiente de Spotify.';
                if (normalized.includes('429')) return 'Spotify está limitando llamadas. Espera un poco.';
                if (normalized.includes('401')) return 'Necesitas reconectar Spotify.';

                return msg;
            }
        });
