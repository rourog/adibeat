<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AdiBeat</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #121212; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #673AB7; display: flex; justify-content: center; align-items: center; z-index: 10; transition: opacity 0.5s ease-out; }
        #splash-screen h1 { font-size: 4rem; font-weight: 900; letter-spacing: 2px; color: #ffffff; }
        
        #main-screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.5s ease-in; padding-bottom: 160px; }
        #status-text { font-size: 1.5rem; margin-bottom: 20px; font-weight: 900; letter-spacing: 1px; text-align: center; color: #b3b3b3; word-break: break-word; }
        
        button { border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: transform 0.1s, box-shadow 0.2s; display: flex; justify-content: center; align-items: center; }
        button:active { transform: scale(0.95); }
        
        #btn-login { padding: 20px 40px; font-size: 1.5rem; border-radius: 50px; background-color: #673AB7; color: #ffffff; box-shadow: 0 8px 20px rgba(103, 58, 183, 0.4); margin-bottom: 20px;}
        
        #btn-play { background-color: #ff4646; color: white; display: none; box-shadow: 0 8px 20px rgba(255, 70, 70, 0.4); width: 90vw; height: 40vh; border-radius: 30px; font-size: 3rem; border: 4px solid #ff4646; flex-direction: column; gap: 10px; margin-bottom: 20px;}
        #timer-text { font-size: 1.5rem; font-weight: normal; opacity: 0.8; display: none; }

        .control-panel { display: none; flex-direction: column; gap: 10px; width: 90vw; }
        .btn-small { padding: 15px 20px; font-size: 1rem; border-radius: 20px; width: 100%; }
        #btn-cycle { background-color: #673AB7; color: #fff; }
        #btn-reset { background-color: #333; color: #fff; }

        #debug-console { position: fixed; bottom: 0; left: 0; width: 100%; height: 170px; background-color: rgba(0, 0, 0, 0.95); color: #00ff00; font-family: monospace; font-size: 12px; padding: 10px; overflow-y: auto; border-top: 2px solid #444; z-index: 100; user-select: text; -webkit-user-select: text; cursor: text; }
        #debug-console div { margin-bottom: 4px; word-wrap: break-word; user-select: all; -webkit-user-select: all; }
        .log-error { color: #ff4646; }
        .log-warn { color: #ffeb3b; }
        .log-success { color: #1DB954; font-weight: bold; }
        .log-info { color: #00bcd4; }
    </style>
</head>
<body>

    <div id="splash-screen"><h1>AdiBeat</h1></div>
    <div id="main-screen">
        <h1 id="status-text">Iniciando sistema...</h1>
        <button id="btn-login" style="display: none;">Conectar Spotify</button>
        <button id="btn-play">
            <span id="play-text">▶ INICIAR TURNO</span>
            <span id="timer-text">15s</span>
        </button>
        
        <div id="control-panel" class="control-panel">
            <button id="btn-cycle" class="btn-small">⏭ Siguiente Playlist</button>
            <button id="btn-reset" class="btn-small">🔄 Forzar Nueva Conexión</button>
        </div>
    </div>

    <div id="debug-console">
        <div>[Sistema] Sintaxis de API corregida. Esperando datos...</div>
    </div>

    <script>
        const debugConsole = document.getElementById("debug-console");
        function logDebug(message, type = "info") {
            const div = document.createElement("div");
            div.innerText = `> ${message}`;
            if (type === "error") div.className = "log-error";
            if (type === "warn") div.className = "log-warn";
            if (type === "success") div.className = "log-success";
            if (type === "info") div.className = "log-info";
            debugConsole.appendChild(div);
            debugConsole.scrollTop = debugConsole.scrollHeight;
            console.log(`[${type.toUpperCase()}]`, message); 
        }

        document.addEventListener("DOMContentLoaded", () => {
            const CLIENT_ID = 'e848a261a8e7411a8a1138326bd4a18f'; 
            const REDIRECT_URI = 'https://rourog.github.io/adibeat/'; 
            const SCOPES = 'user-modify-playback-state user-read-playback-state playlist-read-private playlist-read-collaborative user-read-email user-read-private'; 
            
            const PLAYLISTS = [
                '00MtRUjzL76Njcqe0mNvsD', 
                '6w5cQsiUyHHOZAmxzTXeER', 
                '3qdqZPJUy1ulEwEeLOUmgA'  
            ];
            
            let currentPlaylistIndex = parseInt(localStorage.getItem('adibeat_playlist_index')) || 0;
            if (currentPlaylistIndex >= PLAYLISTS.length) currentPlaylistIndex = 0;
            const PLAYLIST_ID = PLAYLISTS[currentPlaylistIndex];
            
            let playlistTracks = []; 
            let temporizador;

            const splashScreen = document.getElementById("splash-screen");
            const mainScreen = document.getElementById("main-screen");
            const btnLogin = document.getElementById("btn-login");
            const btnPlay = document.getElementById("btn-play");
            const controlPanel = document.getElementById("control-panel");
            const btnReset = document.getElementById("btn-reset");
            const btnCycle = document.getElementById("btn-cycle");
            const statusText = document.getElementById("status-text");
            const playText = document.getElementById("play-text");
            const timerText = document.getElementById("timer-text");

            btnCycle.addEventListener('click', () => {
                let nextIndex = currentPlaylistIndex + 1;
                if (nextIndex >= PLAYLISTS.length) nextIndex = 0;
                localStorage.setItem('adibeat_playlist_index', nextIndex);
                window.location.href = window.location.pathname; 
            });

            btnReset.addEventListener('click', () => {
                localStorage.removeItem('adibeat_token');
                localStorage.removeItem('code_verifier');
                window.location.href = window.location.pathname; 
            });

            const generateRandomString = (length) => {
                const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                const values = crypto.getRandomValues(new Uint8Array(length));
                return Object.values(values).reduce((acc, x) => acc + possible[x % possible.length], "");
            };
            const sha256 = async (plain) => {
                const encoder = new TextEncoder();
                const data = encoder.encode(plain);
                return window.crypto.subtle.digest('SHA-256', data);
            };
            const base64encode = (input) => {
                return btoa(String.fromCharCode(...new Uint8Array(input)))
                    .replace(/=/g, '')
                    .replace(/\+/g, '-')
                    .replace(/\//g, '_');
            };

            setTimeout(() => {
                splashScreen.style.opacity = "0";
                setTimeout(() => {
                    splashScreen.style.display = "none";
                    mainScreen.style.display = "flex";
                    setTimeout(() => mainScreen.style.opacity = "1", 50); 
                }, 500);
            }, 1000);

            let accessToken = localStorage.getItem('adibeat_token') || '';
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code && !accessToken) {
                const codeVerifier = localStorage.getItem('code_verifier');
                fetch("https://accounts.spotify.com/api/token", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        code_verifier: codeVerifier,
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if(data.access_token) {
                        accessToken = data.access_token;
                        localStorage.setItem('adibeat_token', accessToken); 
                        window.history.pushState("", document.title, window.location.pathname); 
                        iniciarApp();
                    } else {
                        statusText.innerText = "Error de conexión";
                        btnLogin.style.display = 'block';
                    }
                });
            } else {
                iniciarApp();
            }

            function iniciarApp() {
                if (accessToken) {
                    statusText.innerText = `Cargando lista ${currentPlaylistIndex + 1}/${PLAYLISTS.length}...`;
                    
                    // AQUÍ ESTÁ LA MAGIA: fields=name,tracks(items(track(uri)))
                    // Esto le dice a Spotify exactamente la ruta anidada que queremos sin que se rompa.
                    const apiUrl = `https://api.spotify.com/v1/playlists/${PLAYLIST_ID}?fields=name,tracks(total,items(track(name,uri)))`;
                    
                    logDebug(`Llamando API con gramática anidada...`, "info");
                    
                    fetch(apiUrl, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    })
                    .then(async response => {
                        if (!response.ok) {
                            if (response.status === 401) throw new Error("TOKEN_CADUCADO");
                            const err = await response.json();
                            throw new Error(`Error HTTP ${response.status}: ${err.error?.message}`);
                        }
                        return response.json();
                    })
                    .then(data => {
                        const playlistName = data.name;
                        logDebug(`Playlist conectada: "${playlistName}"`, "success");

                        if (!data.tracks || !data.tracks.items) {
                            logDebug("CRÍTICO: El objeto tracks.items sigue sin existir. Revisa permisos.", "error");
                        } else {
                            logDebug(`Spotify reporta un Total de: ${data.tracks.total} canciones.`, "info");
                            
                            const items = data.tracks.items;
                            let tracksValidos = 0;
                            
                            playlistTracks = items.filter(item => {
                                // Filtramos canciones bloqueadas por región o subidas locales sin URI de Spotify
                                if (item && item.track && item.track.uri && item.track.uri.startsWith('spotify:track:')) {
                                    tracksValidos++;
                                    return true;
                                }
                                return false;
                            }).map(item => item.track.uri);
                        }
                        
                        controlPanel.style.display = 'flex';
                        
                        if(playlistTracks.length > 0) {
                            logDebug(`Extracción exitosa: ${playlistTracks.length} canciones reales.`, "success");
                            btnPlay.style.display = 'flex';
                            statusText.innerHTML = `Conectado a:<br><strong>${playlistName}</strong><br><span style="font-size:1rem; opacity:0.7;">(${playlistTracks.length} canciones)</span>`;
                        } else {
                            statusText.innerHTML = `<strong>${playlistName}</strong><br>está vacía para la API`;
                        }
                    })
                    .catch(error => {
                        logDebug(`Fallo: ${error.message}`, "error");
                        statusText.innerText = "Error de descarga";
                        controlPanel.style.display = 'flex';
                    });

                } else {
                    statusText.innerText = "Bienvenido a AdiBeat";
                    btnLogin.style.display = 'block';
                    
                    btnLogin.addEventListener('click', async () => {
                        const codeVerifier = generateRandomString(64);
                        window.localStorage.setItem('code_verifier', codeVerifier);
                        const hashed = await sha256(codeVerifier);
                        const codeChallenge = base64encode(hashed);

                        const authUrl = new URL("https://accounts.spotify.com/authorize");
                        authUrl.search = new URLSearchParams({
                            client_id: CLIENT_ID,
                            response_type: 'code',
                            redirect_uri: REDIRECT_URI,
                            scope: SCOPES,
                            code_challenge_method: 'S256',
                            code_challenge: codeChallenge,
                        }).toString();
                        
                        window.location.href = authUrl.toString();
                    });
                }
            }

            // --- LÓGICA DE JUEGO (REPRODUCCIÓN) ---
            btnPlay.addEventListener('click', () => {
                if(playlistTracks.length === 0) return;
                clearTimeout(temporizador);

                const randomIndex = Math.floor(Math.random() * playlistTracks.length);
                const trackUri = playlistTracks[randomIndex];
                logDebug(`Enviando a bocinas: ${trackUri}`);
                
                playText.innerText = "SINTONIZANDO...";
                
                fetch('https://api.spotify.com/v1/me/player/play', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ "uris": [trackUri] })
                })
                .then(async response => {
                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(`HTTP ${response.status}: ${err.error?.message || 'Error de Playback'}`);
                    }
                    
                    logDebug("Comando Play ejecutado.");
                    playText.innerText = "¡ADIVINA!";
                    timerText.style.display = "block";
                    btnPlay.style.backgroundColor = "#673AB7"; 
                    btnPlay.style.borderColor = "#673AB7";
                    
                    let tiempo = 15;
                    timerText.innerText = `${tiempo}s`;
                    const intervalo = setInterval(() => {
                        tiempo--;
                        timerText.innerText = `${tiempo}s`;
                        if(tiempo <= 0) clearInterval(intervalo);
                    }, 1000);

                    temporizador = setTimeout(() => {
                        logDebug("15s alcanzados. Pausando...");
                        fetch('https://api.spotify.com/v1/me/player/pause', {
                            method: 'PUT',
                            headers: { 'Authorization': `Bearer ${accessToken}` }
                        }).then(() => {
                            playText.innerText = "▶ SIGUIENTE";
                            timerText.style.display = "none";
                            btnPlay.style.backgroundColor = "#ff4646";
                            btnPlay.style.borderColor = "#ff4646";
                        });
                    }, 15000); 
                })
                .catch(error => {
                    logDebug(`Playback Falló: ${error.message}`, "error");
                    playText.innerText = "ERROR";
                    statusText.innerHTML = "Abre Spotify en tu<br>celular o TV primero";
                });
            });
        });
    </script>
</body>
</html>
