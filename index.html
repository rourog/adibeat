<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>AdiBeat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-1: #24124f;
      --bg-2: #0f9f9a;
      --ink: #ffffff;
      --muted: rgba(255,255,255,0.78);
      --panel: rgba(255,255,255,0.14);
      --panel-strong: rgba(255,255,255,0.22);
      --line: rgba(255,255,255,0.24);
      --green: #27e37a;
      --cyan: #39d9ff;
      --yellow: #ffd447;
      --orange: #ff7a3d;
      --pink: #ff3fb4;
      --purple: #7f4dff;
      --red: #ff4d5f;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --radius-xl: 34px;
      --radius-md: 22px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 212, 71, 0.35), transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(255, 63, 180, 0.35), transparent 24%),
        radial-gradient(circle at 50% 110%, rgba(39, 227, 122, 0.25), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--ink);
      font-family: "Nunito", "Roboto", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      touch-action: manipulation;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
      user-select: none;
    }

    button:active {
      transform: scale(0.985);
    }

    #rotate-warning {
      display: none;
      width: 100dvw;
      height: 100dvh;
      padding: 28px;
      align-items: center;
      justify-content: center;
      text-align: center;
      background:
        radial-gradient(circle at top left, rgba(255, 212, 71, 0.25), transparent 35%),
        linear-gradient(135deg, #24124f, #0f9f9a);
    }

    .rotate-card {
      width: min(88vw, 460px);
      padding: 30px;
      border-radius: var(--radius-xl);
      background: rgba(255,255,255,0.16);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .rotate-icon {
      font-size: 4.3rem;
      line-height: 1;
      margin-bottom: 12px;
    }

    .rotate-title {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .rotate-text {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.35;
    }

    #app-shell {
      width: 100dvw;
      height: 100dvh;
      padding: max(10px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
    }

    .top-bar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 38px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      border: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      font-weight: 900;
      letter-spacing: 0.3px;
    }

    .brand-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--yellow), var(--pink));
      box-shadow: 0 0 18px rgba(255,212,71,0.9);
    }

    #playlist-label {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: var(--muted);
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      font-weight: 800;
      text-align: center;
      opacity: 0.95;
    }

    .icon-button {
      width: 43px;
      height: 43px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      border: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      display: grid;
      place-items: center;
      font-size: 1.2rem;
    }

    .game-area {
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 10px;
    }

    #btn-game {
      width: 100%;
      height: 100%;
      min-height: 0;
      border-radius: var(--radius-xl);
      padding: clamp(16px, 3vw, 34px);
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.36), transparent 22%),
        linear-gradient(135deg, #ff7a3d 0%, #ff3fb4 52%, #7f4dff 100%);
      border: 2px solid rgba(255,255,255,0.33);
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,0.14);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: background 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    #btn-game::before {
      content: "";
      position: absolute;
      inset: -30%;
      background:
        radial-gradient(circle, rgba(255,255,255,0.16) 0 8%, transparent 9% 100%);
      background-size: 72px 72px;
      transform: rotate(-12deg);
      opacity: 0.38;
      pointer-events: none;
    }

    #btn-game > * {
      position: relative;
      z-index: 1;
    }

    #state-label {
      font-size: clamp(0.82rem, 2.3vw, 1.15rem);
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.92;
      margin-bottom: clamp(5px, 1vw, 10px);
    }

    #main-title {
      font-size: clamp(2.3rem, 9vw, 6.7rem);
      line-height: 0.92;
      font-weight: 900;
      text-align: center;
      text-wrap: balance;
      text-shadow: 0 10px 30px rgba(0,0,0,0.26);
      max-width: 96%;
    }

    #counter {
      margin-top: clamp(8px, 1.8vw, 18px);
      min-width: clamp(80px, 16vw, 135px);
      padding: 6px 18px;
      border-radius: 999px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.28);
      font-size: clamp(2rem, 6.8vw, 5rem);
      line-height: 1;
      font-weight: 900;
      box-shadow: inset 0 0 18px rgba(0,0,0,0.12);
    }

    #track-artist-inline {
      margin-top: clamp(8px, 1.3vw, 14px);
      font-size: clamp(1.1rem, 3.6vw, 2.35rem);
      line-height: 1.05;
      font-weight: 900;
      color: rgba(255,255,255,0.95);
      max-width: 92%;
      text-align: center;
      text-wrap: balance;
    }

    #next-hint {
      margin-top: clamp(7px, 1.2vw, 12px);
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.20);
      font-size: clamp(0.82rem, 2.1vw, 1rem);
      font-weight: 900;
      color: rgba(255,255,255,0.82);
    }

    #btn-game.state-ready {
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.36), transparent 22%),
        linear-gradient(135deg, #27e37a 0%, #39d9ff 52%, #7f4dff 100%);
    }

    #btn-game.state-playing {
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.34), transparent 22%),
        linear-gradient(135deg, #ff7a3d 0%, #ff3fb4 55%, #7f4dff 100%);
      animation: pulseGlow 1.5s ease-in-out infinite;
    }

    #btn-game.state-timeout {
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.32), transparent 22%),
        linear-gradient(135deg, #ff4d5f 0%, #ff7a3d 58%, #ffd447 100%);
      animation: urgentPulse 0.8s ease-in-out infinite alternate;
    }

    #btn-game.state-revealed {
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.28), transparent 22%),
        linear-gradient(135deg, #24124f 0%, #7f4dff 46%, #0f9f9a 100%);
    }

    .trivia-row {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      min-height: clamp(62px, 16dvh, 102px);
    }

    .trivia-row.visible {
      display: grid;
    }

    .trivia-button {
      width: 100%;
      min-width: 0;
      border-radius: var(--radius-md);
      padding: 10px 14px;
      background: rgba(255,255,255,0.20);
      border: 1px solid var(--line);
      box-shadow: 0 12px 36px rgba(0,0,0,0.22), inset 0 0 0 1px rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .trivia-button:first-child {
      background: linear-gradient(135deg, rgba(255,212,71,0.92), rgba(255,122,61,0.92));
      color: #24124f;
    }

    .trivia-button:last-child {
      background: linear-gradient(135deg, rgba(57,217,255,0.92), rgba(39,227,122,0.92));
      color: #24124f;
    }

    .trivia-label {
      font-size: clamp(0.78rem, 2vw, 0.96rem);
      line-height: 1.05;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      opacity: 0.86;
      text-align: center;
    }

    .trivia-value {
      margin-top: 3px;
      font-size: clamp(1rem, 3.2vw, 1.75rem);
      line-height: 1.05;
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .trivia-button.revealed .trivia-label {
      opacity: 0.68;
    }

    .status-strip {
      min-height: 32px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: clamp(0.78rem, 2vw, 0.95rem);
      font-weight: 800;
    }

    #status-text {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #btn-login {
      display: none;
      border-radius: 999px;
      padding: 8px 16px;
      background: var(--green);
      color: #102017;
      font-weight: 900;
      box-shadow: 0 10px 25px rgba(39,227,122,0.25);
    }

    #settings-panel {
      position: fixed;
      inset: auto max(14px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) auto;
      width: min(430px, calc(100dvw - 28px));
      display: none;
      grid-template-columns: 1fr;
      gap: 9px;
      padding: 12px;
      border-radius: var(--radius-md);
      background: rgba(20,14,40,0.84);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      z-index: 5;
    }

    #settings-panel.open {
      display: grid;
    }

    .settings-title {
      font-size: 0.86rem;
      font-weight: 900;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #input-playlist {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.22);
      outline: 0;
      border-radius: 18px;
      padding: 12px 14px;
      background: rgba(255,255,255,0.12);
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 800;
    }

    #input-playlist::placeholder {
      color: rgba(255,255,255,0.54);
    }

    .settings-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .small-action {
      border-radius: 18px;
      padding: 11px 12px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.20);
      font-size: 0.85rem;
      font-weight: 900;
    }

    .small-action.primary {
      background: var(--green);
      color: #112018;
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: var(--shadow), 0 0 0 rgba(255,255,255,0); }
      50% { box-shadow: var(--shadow), 0 0 32px rgba(255,255,255,0.26); }
    }

    @keyframes urgentPulse {
      from { filter: brightness(1); }
      to { filter: brightness(1.17); }
    }

    @media (orientation: portrait) {
      #app-shell {
        display: none;
      }

      #rotate-warning {
        display: flex;
      }
    }

    @media (max-height: 420px) and (orientation: landscape) {
      #app-shell {
        gap: 7px;
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .top-bar {
        min-height: 34px;
      }

      .brand,
      .icon-button {
        height: 36px;
      }

      .icon-button {
        width: 36px;
      }

      .trivia-row {
        min-height: 58px;
      }

      #state-label {
        margin-bottom: 3px;
      }

      #counter {
        margin-top: 5px;
      }

      .status-strip {
        min-height: 24px;
      }
    }
  </style>
</head>

<body>
  <div id="rotate-warning">
    <div class="rotate-card">
      <div class="rotate-icon">↻</div>
      <div class="rotate-title">Gira el teléfono</div>
      <div class="rotate-text">AdiBeat está diseñado para jugarse en horizontal. En vertical se desperdicia pantalla, y eso no se perdona.</div>
    </div>
  </div>

  <main id="app-shell">
    <header class="top-bar">
      <div class="brand"><span class="brand-dot"></span><span>AdiBeat</span></div>
      <div id="playlist-label">Preparando juego...</div>
      <button id="btn-settings" class="icon-button" type="button" aria-label="Ajustes">⚙</button>
    </header>

    <section class="game-area">
      <button id="btn-game" class="state-ready" type="button">
        <span id="state-label">LISTO</span>
        <span id="main-title">INICIAR</span>
        <span id="counter" hidden>15</span>
        <span id="track-artist-inline" hidden></span>
        <span id="next-hint" hidden>Toca aquí para siguiente canción</span>
      </button>

      <div id="trivia-row" class="trivia-row" aria-live="polite">
        <button id="btn-release" class="trivia-button" type="button">
          <span class="trivia-label">Fecha de publicación</span>
          <span class="trivia-value">Toca para revelar</span>
        </button>
        <button id="btn-album" class="trivia-button" type="button">
          <span class="trivia-label">Nombre del álbum</span>
          <span class="trivia-value">Toca para revelar</span>
        </button>
      </div>
    </section>

    <footer class="status-strip">
      <div id="status-text">Conecta Spotify y abre la app en un dispositivo activo.</div>
      <button id="btn-login" type="button">Conectar Spotify</button>
    </footer>
  </main>

  <aside id="settings-panel">
    <div class="settings-title">Ajustes rápidos</div>
    <input type="text" id="input-playlist" placeholder="Pega link o ID de playlist" autocomplete="off">
    <div class="settings-actions">
      <button id="btn-load-custom" class="small-action primary" type="button">Cargar</button>
      <button id="btn-cycle" class="small-action" type="button">Cambiar lista</button>
      <button id="btn-reset" class="small-action" type="button">Reiniciar</button>
      <button id="btn-close-settings" class="small-action" type="button">Cerrar</button>
    </div>
  </aside>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const CLIENT_ID = "e848a261a8e7411a8a1138326bd4a18f";
      const REDIRECT_URI = "https://rourog.github.io/adibeat/";
      const SCOPES = [
        "user-modify-playback-state",
        "user-read-playback-state",
        "playlist-read-private",
        "playlist-read-collaborative",
        "user-read-email",
        "user-read-private",
        "user-library-read"
      ].join(" ");

      const PLAYLISTS = [
        "00MtRUjzL76Njcqe0mNvsD",
        "6w5cQsiUyHHOZAmxzTXeER",
        "3qdqZPJUy1ulEwEeLOUmgA"
      ];

      const ROUND_SECONDS = 15;

      const ui = {
        playlistLabel: document.getElementById("playlist-label"),
        statusText: document.getElementById("status-text"),
        btnLogin: document.getElementById("btn-login"),
        btnGame: document.getElementById("btn-game"),
        stateLabel: document.getElementById("state-label"),
        mainTitle: document.getElementById("main-title"),
        counter: document.getElementById("counter"),
        artistInline: document.getElementById("track-artist-inline"),
        nextHint: document.getElementById("next-hint"),
        triviaRow: document.getElementById("trivia-row"),
        btnRelease: document.getElementById("btn-release"),
        btnAlbum: document.getElementById("btn-album"),
        settingsPanel: document.getElementById("settings-panel"),
        btnSettings: document.getElementById("btn-settings"),
        btnCloseSettings: document.getElementById("btn-close-settings"),
        inputPlaylist: document.getElementById("input-playlist"),
        btnLoadCustom: document.getElementById("btn-load-custom"),
        btnCycle: document.getElementById("btn-cycle"),
        btnReset: document.getElementById("btn-reset")
      };

      let accessToken = localStorage.getItem("adibeat_token") || "";
      let refreshToken = localStorage.getItem("adibeat_refresh_token") || "";
      let playlistTracks = [];
      let currentTrack = null;
      let currentPlaylistIndex = Number.parseInt(localStorage.getItem("adibeat_playlist_index") || "0", 10);
      let gameState = "IDLE";
      let roundTimer = null;
      let roundTicker = null;
      let audioCtx = null;

      if (!Number.isFinite(currentPlaylistIndex) || currentPlaylistIndex >= PLAYLISTS.length) {
        currentPlaylistIndex = 0;
      }

      const randomString = (length) => {
        const possible = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
        const values = crypto.getRandomValues(new Uint8Array(length));
        return Array.from(values, x => possible[x % possible.length]).join("");
      };

      const sha256 = async (plain) => {
        const encoder = new TextEncoder();
        return crypto.subtle.digest("SHA-256", encoder.encode(plain));
      };

      const base64encode = (input) => {
        return btoa(String.fromCharCode(...new Uint8Array(input)))
          .replace(/=/g, "")
          .replace(/\+/g, "-")
          .replace(/\//g, "_");
      };

      function setStatus(message) {
        ui.statusText.textContent = message;
      }

      function setGameClass(stateClass) {
        ui.btnGame.classList.remove("state-ready", "state-playing", "state-timeout", "state-revealed");
        ui.btnGame.classList.add(stateClass);
      }

      function resetTriviaButtons() {
        ui.triviaRow.classList.remove("visible");

        ui.btnRelease.classList.remove("revealed");
        ui.btnRelease.querySelector(".trivia-label").textContent = "Fecha de publicación";
        ui.btnRelease.querySelector(".trivia-value").textContent = "Toca para revelar";

        ui.btnAlbum.classList.remove("revealed");
        ui.btnAlbum.querySelector(".trivia-label").textContent = "Nombre del álbum";
        ui.btnAlbum.querySelector(".trivia-value").textContent = "Toca para revelar";
      }

      function setReadyUI() {
        gameState = "IDLE";
        clearRoundTimers();
        setGameClass("state-ready");
        ui.stateLabel.textContent = "LISTO";
        ui.mainTitle.textContent = playlistTracks.length ? "INICIAR" : "CARGANDO";
        ui.counter.hidden = true;
        ui.artistInline.hidden = true;
        ui.artistInline.textContent = "";
        ui.nextHint.hidden = true;
        resetTriviaButtons();
      }

      function setPlayingUI(seconds) {
        gameState = "PLAYING";
        setGameClass("state-playing");
        ui.stateLabel.textContent = "RONDA ACTIVA";
        ui.mainTitle.textContent = "Adivina el Beat!!!";
        ui.counter.textContent = seconds;
        ui.counter.hidden = false;
        ui.artistInline.hidden = true;
        ui.artistInline.textContent = "";
        ui.nextHint.hidden = true;
        resetTriviaButtons();
      }

      function setTimeoutUI() {
        gameState = "TIMEOUT";
        clearRoundTimers();
        setGameClass("state-timeout");
        ui.stateLabel.textContent = "TIEMPO";
        ui.mainTitle.textContent = "ADIVINEN TODOS";
        ui.counter.hidden = true;
        ui.artistInline.hidden = true;
        ui.nextHint.hidden = true;
        setStatus("Se acabó el contador. La música sigue; presiona para revelar.");
        softBeep("timeout");
      }

      function setRevealedUI() {
        if (!currentTrack) return;

        gameState = "REVEALED";
        clearRoundTimers();
        setGameClass("state-revealed");
        ui.stateLabel.textContent = "RESPUESTA";
        ui.mainTitle.textContent = currentTrack.name;
        ui.counter.hidden = true;
        ui.artistInline.textContent = currentTrack.artist;
        ui.artistInline.hidden = false;
        ui.nextHint.hidden = false;
        ui.triviaRow.classList.add("visible");
        setStatus("Respuesta revelada. La canción continúa sonando.");
        softBeep("reveal");
      }

      function clearRoundTimers() {
        if (roundTimer) clearTimeout(roundTimer);
        if (roundTicker) clearInterval(roundTicker);
        roundTimer = null;
        roundTicker = null;
      }

      function normalizePlaylistInput(rawInput) {
        let value = rawInput.trim();
        if (!value) return "";

        if (value.includes("playlist/")) {
          value = value.split("playlist/")[1].split("?")[0].split("&")[0];
        }

        if (value.startsWith("spotify:playlist:")) {
          value = value.replace("spotify:playlist:", "");
        }

        return value.trim();
      }

      function processTracks(itemsArray) {
        return (itemsArray || []).map(obj => {
          const t = obj?.item || obj?.track;
          if (!t || !t.uri || !t.uri.startsWith("spotify:track:")) return null;

          const releaseDate = t.album?.release_date || "Fecha no disponible";
          const precision = t.album?.release_date_precision || "day";

          return {
            uri: t.uri,
            name: t.name || "Canción desconocida",
            artist: Array.isArray(t.artists) ? t.artists.map(a => a.name).join(", ") : "Artista desconocido",
            album: t.album?.name || "Álbum no disponible",
            releaseDate,
            releasePrecision: precision
          };
        }).filter(Boolean);
      }

      function formatReleaseDate(track) {
        if (!track?.releaseDate || track.releaseDate === "Fecha no disponible") return "Fecha no disponible";
        if (track.releasePrecision === "year") return track.releaseDate;
        if (track.releasePrecision === "month") return track.releaseDate;
        return track.releaseDate;
      }

      function getAudioContext() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === "suspended") audioCtx.resume();
        return audioCtx;
      }

      function softBeep(type) {
        try {
          const ctx = getAudioContext();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.type = "sine";
          osc.connect(gain);
          gain.connect(ctx.destination);

          const now = ctx.currentTime;
          const startFreq = type === "timeout" ? 220 : 620;
          const endFreq = type === "timeout" ? 150 : 930;

          osc.frequency.setValueAtTime(startFreq, now);
          osc.frequency.exponentialRampToValueAtTime(endFreq, now + 0.18);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(0.075, now + 0.035);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.24);

          osc.start(now);
          osc.stop(now + 0.26);
        } catch (e) {
          // Silencioso por diseño: el juego no depende de estos sonidos.
        }
      }

      async function refreshAccessTokenIfPossible() {
        if (!refreshToken) return false;

        const response = await fetch("https://accounts.spotify.com/api/token", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            client_id: CLIENT_ID,
            grant_type: "refresh_token",
            refresh_token: refreshToken
          })
        });

        if (!response.ok) return false;

        const data = await response.json();
        if (!data.access_token) return false;

        accessToken = data.access_token;
        localStorage.setItem("adibeat_token", accessToken);

        if (data.refresh_token) {
          refreshToken = data.refresh_token;
          localStorage.setItem("adibeat_refresh_token", refreshToken);
        }

        return true;
      }

      async function spotifyFetch(url, options = {}, retry = true) {
        const response = await fetch(url, {
          ...options,
          headers: {
            ...(options.headers || {}),
            "Authorization": `Bearer ${accessToken}`
          }
        });

        if (response.status === 401 && retry) {
          const refreshed = await refreshAccessTokenIfPossible();
          if (refreshed) return spotifyFetch(url, options, false);
        }

        return response;
      }

      async function fetchJson(url, options = {}) {
        const response = await spotifyFetch(url, options);
        if (!response.ok) {
          const body = await response.text().catch(() => "");
          throw new Error(`Spotify API ${response.status}: ${body}`);
        }
        return response.json();
      }

      async function exchangeCodeForToken(code) {
        const codeVerifier = localStorage.getItem("code_verifier");

        const response = await fetch("https://accounts.spotify.com/api/token", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({
            client_id: CLIENT_ID,
            grant_type: "authorization_code",
            code,
            redirect_uri: REDIRECT_URI,
            code_verifier: codeVerifier
          })
        });

        const data = await response.json();

        if (!response.ok || !data.access_token) {
          throw new Error("No se pudo completar la conexión con Spotify.");
        }

        accessToken = data.access_token;
        localStorage.setItem("adibeat_token", accessToken);

        if (data.refresh_token) {
          refreshToken = data.refresh_token;
          localStorage.setItem("adibeat_refresh_token", refreshToken);
        }

        window.history.replaceState({}, document.title, window.location.pathname);
      }

      async function login() {
        const codeVerifier = randomString(64);
        localStorage.setItem("code_verifier", codeVerifier);

        const codeChallenge = base64encode(await sha256(codeVerifier));
        const authUrl = new URL("https://accounts.spotify.com/authorize");

        authUrl.search = new URLSearchParams({
          client_id: CLIENT_ID,
          response_type: "code",
          redirect_uri: REDIRECT_URI,
          scope: SCOPES,
          code_challenge_method: "S256",
          code_challenge: codeChallenge,
          show_dialog: "true"
        }).toString();

        window.location.href = authUrl.toString();
      }

      async function loadPlaylist(playlistId) {
        ui.btnGame.disabled = true;
        ui.mainTitle.textContent = "CARGANDO";
        ui.stateLabel.textContent = "SPOTIFY";
        ui.counter.hidden = true;
        ui.artistInline.hidden = true;
        ui.nextHint.hidden = true;
        resetTriviaButtons();
        setStatus("Cargando canciones...");
        ui.playlistLabel.textContent = "Cargando playlist...";

        let playlistName = "Playlist cargada";
        let items = [];

        try {
          const playlistData = await fetchJson(`https://api.spotify.com/v1/playlists/${playlistId}?fields=name`);
          playlistName = playlistData.name || playlistName;

          let nextUrl = `https://api.spotify.com/v1/playlists/${playlistId}/items?limit=100&fields=items(track(uri,name,artists(name),album(name,release_date,release_date_precision))),next`;

          while (nextUrl) {
            const page = await fetchJson(nextUrl);
            items = items.concat(page.items || []);
            nextUrl = page.next;
          }

          playlistTracks = processTracks(items);

          if (!playlistTracks.length) {
            throw new Error("La playlist no tiene canciones utilizables.");
          }

          ui.playlistLabel.textContent = `${playlistName} · ${playlistTracks.length} canciones`;
          setStatus("Listo. Presiona INICIAR para empezar la ronda.");
          ui.btnGame.disabled = false;
          setReadyUI();
        } catch (playlistError) {
          try {
            setStatus("No pude cargar esa playlist. Intentando con tus canciones guardadas...");
            const saved = await fetchJson("https://api.spotify.com/v1/me/tracks?limit=50");
            playlistTracks = processTracks(saved.items || []);

            if (!playlistTracks.length) throw new Error("No hay canciones guardadas disponibles.");

            ui.playlistLabel.textContent = `Tus canciones guardadas · ${playlistTracks.length} canciones`;
            setStatus("Listo con canciones guardadas. Presiona INICIAR.");
            ui.btnGame.disabled = false;
            setReadyUI();
          } catch (fallbackError) {
            playlistTracks = [];
            ui.btnGame.disabled = true;
            ui.playlistLabel.textContent = "Sin canciones cargadas";
            ui.mainTitle.textContent = "SIN LISTA";
            ui.stateLabel.textContent = "ERROR";
            setStatus("No se pudo cargar música. Revisa conexión, permisos o ID de playlist.");
          }
        }
      }

      async function startRound() {
        if (!playlistTracks.length || !accessToken) return;

        clearRoundTimers();
        currentTrack = playlistTracks[Math.floor(Math.random() * playlistTracks.length)];
        setPlayingUI(ROUND_SECONDS);
        setStatus("Reproduciendo. Presiona el botón si alguien adivina.");

        try {
          const response = await spotifyFetch("https://api.spotify.com/v1/me/player/play", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ uris: [currentTrack.uri] })
          });

          if (!response.ok) {
            throw new Error("No hay dispositivo activo.");
          }

          let remaining = ROUND_SECONDS;
          roundTicker = setInterval(() => {
            remaining -= 1;
            ui.counter.textContent = remaining;

            if (remaining <= 0) {
              clearInterval(roundTicker);
              roundTicker = null;
            }
          }, 1000);

          roundTimer = setTimeout(() => {
            setTimeoutUI();
          }, ROUND_SECONDS * 1000);

          softBeep("start");
        } catch (error) {
          clearRoundTimers();
          gameState = "IDLE";
          setGameClass("state-ready");
          ui.stateLabel.textContent = "SIN DISPOSITIVO";
          ui.mainTitle.textContent = "ABRE SPOTIFY";
          ui.counter.hidden = true;
          setStatus("Spotify necesita estar abierto y reproduciendo en algún dispositivo activo.");
        }
      }

      function revealTrack() {
        if (!currentTrack) return;
        setRevealedUI();
      }

      function revealTrivia(kind) {
        if (!currentTrack || gameState !== "REVEALED") return;

        const target = kind === "release" ? ui.btnRelease : ui.btnAlbum;
        const label = target.querySelector(".trivia-label");
        const value = target.querySelector(".trivia-value");

        target.classList.add("revealed");

        if (kind === "release") {
          label.textContent = "Fecha de publicación";
          value.textContent = formatReleaseDate(currentTrack);
        } else {
          label.textContent = "Nombre del álbum";
          value.textContent = currentTrack.album || "Álbum no disponible";
        }

        softBeep("reveal");
      }

      ui.btnGame.addEventListener("click", () => {
        getAudioContext();

        if (gameState === "IDLE" || gameState === "REVEALED") {
          startRound();
          return;
        }

        if (gameState === "PLAYING" || gameState === "TIMEOUT") {
          revealTrack();
        }
      });

      ui.btnRelease.addEventListener("click", () => revealTrivia("release"));
      ui.btnAlbum.addEventListener("click", () => revealTrivia("album"));

      ui.btnLogin.addEventListener("click", login);

      ui.btnSettings.addEventListener("click", () => {
        ui.settingsPanel.classList.toggle("open");
      });

      ui.btnCloseSettings.addEventListener("click", () => {
        ui.settingsPanel.classList.remove("open");
      });

      ui.btnCycle.addEventListener("click", () => {
        currentPlaylistIndex = (currentPlaylistIndex + 1) % PLAYLISTS.length;
        localStorage.setItem("adibeat_playlist_index", String(currentPlaylistIndex));
        localStorage.removeItem("adibeat_custom_playlist");
        ui.settingsPanel.classList.remove("open");
        loadPlaylist(PLAYLISTS[currentPlaylistIndex]);
      });

      ui.btnReset.addEventListener("click", () => {
        localStorage.removeItem("adibeat_token");
        localStorage.removeItem("adibeat_refresh_token");
        localStorage.removeItem("code_verifier");
        localStorage.removeItem("adibeat_custom_playlist");
        window.location.reload();
      });

      ui.btnLoadCustom.addEventListener("click", () => {
        const playlistId = normalizePlaylistInput(ui.inputPlaylist.value);
        if (!playlistId) return;

        localStorage.setItem("adibeat_custom_playlist", playlistId);
        ui.settingsPanel.classList.remove("open");
        loadPlaylist(playlistId);
      });

      async function boot() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get("code");

        try {
          if (code && !accessToken) {
            await exchangeCodeForToken(code);
          }

          if (!accessToken && refreshToken) {
            await refreshAccessTokenIfPossible();
          }

          if (!accessToken) {
            ui.btnLogin.style.display = "inline-flex";
            ui.btnGame.disabled = true;
            ui.stateLabel.textContent = "SPOTIFY";
            ui.mainTitle.textContent = "CONECTA";
            ui.playlistLabel.textContent = "Sin conexión";
            setStatus("Conecta Spotify para cargar canciones.");
            return;
          }

          ui.btnLogin.style.display = "none";

          const savedPlaylist = localStorage.getItem("adibeat_custom_playlist");
          await loadPlaylist(savedPlaylist || PLAYLISTS[currentPlaylistIndex]);
        } catch (error) {
          ui.btnLogin.style.display = "inline-flex";
          ui.btnGame.disabled = true;
          ui.stateLabel.textContent = "ERROR";
          ui.mainTitle.textContent = "RECONECTA";
          ui.playlistLabel.textContent = "Error de conexión";
          setStatus("La sesión falló. Reinicia o vuelve a conectar Spotify.");
        }
      }

      boot();
    });
  </script>
