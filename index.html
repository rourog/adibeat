<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AdiBeat</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: #121212; color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #673AB7; display: flex; justify-content: center; align-items: center; z-index: 10; transition: opacity 0.5s ease-out; }
        #splash-screen h1 { font-size: 4rem; font-weight: 900; letter-spacing: 2px; color: #ffffff; }
        
        #main-screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.5s ease-in; padding-bottom: 200px; }
        #status-text { font-size: 1.5rem; margin-bottom: 20px; font-weight: 900; letter-spacing: 1px; text-align: center; color: #b3b3b3; word-break: break-word; }
        
        button { border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: transform 0.1s, box-shadow 0.2s; display: flex; justify-content: center; align-items: center; }
        button:active { transform: scale(0.95); }
        
        #btn-login { padding: 20px 40px; font-size: 1.5rem; border-radius: 50px; background-color: #1DB954; color: #121212; box-shadow: 0 8px 20px rgba(29, 185, 84, 0.4); margin-bottom: 20px;}
        
        #btn-play { background-color: #ff4646; color: white; display: none; box-shadow: 0 8px 20px rgba(255, 70, 70, 0.4); width: 90vw; height: 25vh; border-radius: 30px; font-size: 3rem; border: 4px solid #ff4646; flex-direction: column; gap: 10px; margin-bottom: 20px;}
        #timer-text { font-size: 1.5rem; font-weight: normal; opacity: 0.8; display: none; }

        /* Contenedor de Info de la Canción */
        #track-info { display: none; text-align: center; margin-bottom: 20px; background-color: #1e1e1e; padding: 20px; border-radius: 15px; width: 90vw; border: 1px solid #333; animation: fadeIn 0.5s ease-in; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #track-name { font-size: 1.8rem; font-weight: 900; color: #1DB954; margin-bottom: 8px; line-height: 1.1;}
        #track-artist { font-size: 1.2rem; font-weight: 700; color: #ffffff; margin-bottom: 5px; }
        #track-album { font-size: 1rem; font-weight: 400; color: #b3b3b3; font-style: italic; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        #setup-panel { display: none; flex-direction: column; gap: 10px; width: 90vw; margin-bottom: 20px; }
        #input-playlist { padding: 15px; border-radius: 10px; font-size: 1rem; border: none; text-align: center; outline: none; background-color: #2a2a2a; color: #fff; }
        #btn-load-custom { padding: 15px 20px; font-size: 1rem; border-radius: 20px; width: 100%; background-color: #444; color: #fff; }

        .control-panel { display: none; flex-direction: column; gap: 10px; width: 90vw; }
        .btn-small { padding: 15px 20px; font-size: 1rem; border-radius: 20px; width: 100%; }
        #btn-cycle { background-color: #673AB7; color: #fff; }
        #btn-reset { background-color: #333; color: #fff; }

        #debug-console { position: fixed; bottom: 0; left: 0; width: 100%; height: 180px; background-color: rgba(0, 0, 0, 0.95); color: #00ff00; font-family: monospace; font-size: 12px; padding: 10px; overflow-y: auto; border-top: 2px solid #444; z-index: 100; user-select: text; -webkit-user-select: text; cursor: text; }
        #debug-console div { margin-bottom: 4px; word-wrap: break-word; user-select: all; -webkit-user-select: all; }
        .log-error { color: #ff4646; }
        .log-warn { color: #ffeb3b; }
        .log-success { color: #1DB954; font-weight: bold; }
        .log-info { color: #00bcd4; }
    </style>
</head>
<body>

    <div id="splash-screen"><h1>AdiBeat</h1></div>
    <div id="main-screen">
        <h1 id="status-text">Iniciando sistema...</h1>
        <button id="btn-login" style="display: none;">Conectar Spotify</button>
        
        <div id="setup-panel">
            <input type="text" id="input-playlist" placeholder="O pega un link directo aquí...">
            <button id="btn-load-custom">Cargar Lista Manual</button>
        </div>

        <button id="btn-play">
            <span id="play-text">▶ INICIAR TURNO</span>
            <span id="timer-text">15s</span>
        </button>

        <div id="track-info">
            <div id="track-name">Nombre de la Canción</div>
            <div id="track-artist">Artista</div>
            <div id="track-album">Álbum (Año)</div>
        </div>
        
        <div id="control-panel" class="control-panel">
            <button id="btn-cycle" class="btn-small">⏭ Siguiente Playlist</button>
            <button id="btn-reset" class="btn-small">🔄 Forzar Nueva Conexión</button>
        </div>
    </div>

    <div id="debug-console">
        <div>[Sistema] Modos Ciclado y Escáner de Cuentas Activados.</div>
    </div>

    <script>
        const debugConsole = document.getElementById("debug-console");
        function logDebug(message, type = "info") {
            const div = document.createElement("div");
            div.innerText = `> ${message}`;
            if (type === "error") div.className = "log-error";
            if (type === "warn") div.className = "log-warn";
            if (type === "success") div.className = "log-success";
            if (type === "info") div.className = "log-info";
            debugConsole.appendChild(div);
            debugConsole.scrollTop = debugConsole.scrollHeight;
            console.log(`[${type.toUpperCase()}]`, message); 
        }

        document.addEventListener("DOMContentLoaded", () => {
            const CLIENT_ID = 'e848a261a8e7411a8a1138326bd4a18f'; 
            const REDIRECT_URI = 'https://rourog.github.io/adibeat/'; 
            const SCOPES = 'user-modify-playback-state user-read-playback-state playlist-read-private playlist-read-collaborative user-read-email user-read-private user-library-read'; 
            
            // --- EL ARREGLO DE TUS LISTAS ---
            const PLAYLISTS = [
                '00MtRUjzL76Njcqe0mNvsD', 
                '6w5cQsiUyHHOZAmxzTXeER', 
                '3qdqZPJUy1ulEwEeLOUmgA'  
            ];
            
            let currentPlaylistIndex = parseInt(localStorage.getItem('adibeat_playlist_index')) || 0;
            if (currentPlaylistIndex >= PLAYLISTS.length) currentPlaylistIndex = 0;
            
            let playlistTracks = []; 
            let temporizador;

            const splashScreen = document.getElementById("splash-screen");
            const mainScreen = document.getElementById("main-screen");
            const btnLogin = document.getElementById("btn-login");
            const setupPanel = document.getElementById("setup-panel");
            const inputPlaylist = document.getElementById("input-playlist");
            const btnLoadCustom = document.getElementById("btn-load-custom");
            const btnPlay = document.getElementById("btn-play");
            const controlPanel = document.getElementById("control-panel");
            const btnReset = document.getElementById("btn-reset");
            const btnCycle = document.getElementById("btn-cycle");
            const statusText = document.getElementById("status-text");
            const playText = document.getElementById("play-text");
            const timerText = document.getElementById("timer-text");
            
            const trackInfoDiv = document.getElementById("track-info");
            const trackNameEl = document.getElementById("track-name");
            const trackArtistEl = document.getElementById("track-artist");
            const trackAlbumEl = document.getElementById("track-album");

            // Función para ciclar listas
            btnCycle.addEventListener('click', () => {
                let nextIndex = currentPlaylistIndex + 1;
                if (nextIndex >= PLAYLISTS.length) nextIndex = 0;
                localStorage.setItem('adibeat_playlist_index', nextIndex);
                localStorage.removeItem('adibeat_custom_playlist'); // Borra cualquier link pegado
                window.location.href = window.location.pathname; 
            });

            btnReset.addEventListener('click', () => {
                localStorage.removeItem('adibeat_token');
                localStorage.removeItem('code_verifier');
                localStorage.removeItem('adibeat_custom_playlist'); 
                window.location.href = window.location.pathname; 
            });

            const generateRandomString = (length) => {
                const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                const values = crypto.getRandomValues(new Uint8Array(length));
                return Object.values(values).reduce((acc, x) => acc + possible[x % possible.length], "");
            };
            const sha256 = async (plain) => {
                const encoder = new TextEncoder();
                const data = encoder.encode(plain);
                return window.crypto.subtle.digest('SHA-256', data);
            };
            const base64encode = (input) => {
                return btoa(String.fromCharCode(...new Uint8Array(input)))
                    .replace(/=/g, '')
                    .replace(/\+/g, '-')
                    .replace(/\//g, '_');
            };

            setTimeout(() => {
                splashScreen.style.opacity = "0";
                setTimeout(() => {
                    splashScreen.style.display = "none";
                    mainScreen.style.display = "flex";
                    setTimeout(() => mainScreen.style.opacity = "1", 50); 
                }, 500);
            }, 1000);

            let accessToken = localStorage.getItem('adibeat_token') || '';
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code && !accessToken) {
                const codeVerifier = localStorage.getItem('code_verifier');
                fetch("https://accounts.spotify.com/api/token", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        code_verifier: codeVerifier,
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if(data.access_token) {
                        accessToken = data.access_token;
                        localStorage.setItem('adibeat_token', accessToken); 
                        window.history.replaceState({}, document.title, window.location.pathname); 
                        iniciarApp();
                    } else {
                        statusText.innerText = "Error de conexión";
                        btnLogin.style.display = 'block';
                    }
                });
            } else {
                iniciarApp();
            }

            function procesarCanciones(itemsArray) {
                return itemsArray.map(item => {
                    const t = item?.track;
                    if (!t || !t.uri || !t.uri.startsWith('spotify:track:')) return null;
                    
                    return {
                        uri: t.uri,
                        name: t.name || 'Desconocida',
                        artist: t.artists ? t.artists.map(a => a.name).join(', ') : 'Varios',
                        album: t.album ? t.album.name : 'Sencillo',
                        year: (t.album && t.album.release_date) ? t.album.release_date.substring(0, 4) : '????'
                    };
                }).filter(trackObj => trackObj !== null);
            }

            function extractPlaylistId(input) {
                if (input.includes('playlist/')) {
                    return input.split('playlist/')[1].split('?')[0];
                }
                return input; 
            }

            // FUNCIÓN MEJORADA: COMPARA IDs ANTES DE DESCARGAR
            function cargarPlaylist(playlistId) {
                statusText.innerText = `Analizando seguridad...`;
                btnPlay.style.display = 'none';
                setupPanel.style.display = 'none';

                let loggedInUserId = '';
                let playlistName = '';

                // Diagnóstico Simultáneo
                Promise.all([
                    fetch('https://api.spotify.com/v1/me', { headers: { 'Authorization': `Bearer ${accessToken}` } }).then(res => res.json()),
                    fetch(`https://api.spotify.com/v1/playlists/${playlistId}`, { headers: { 'Authorization': `Bearer ${accessToken}` } }).then(res => res.json())
                ])
                .then(([userData, playlistData]) => {
                    loggedInUserId = userData.id;
                    const ownerId = playlistData.owner?.id;
                    playlistName = playlistData.name || "Lista Custom";

                    logDebug(`ID de la Sesión Actual: ${loggedInUserId}`, "info");
                    logDebug(`ID del Creador de la Lista: ${ownerId}`, "info");

                    if (loggedInUserId !== ownerId) {
                        logDebug("⚠️ ALERTA: Tu sesión no coincide con el creador. Spotify bloqueará la lista.", "error");
                    } else {
                        logDebug("✅ IDs idénticos. Permiso concedido por propiedad.", "success");
                    }

                    // Proceder a descargar pistas
                    return fetch(`https://api.spotify.com/v1/playlists/${playlistId}/tracks?limit=100`, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                })
                .then(async response => {
                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(`HTTP ${response.status}: ${err.error?.message}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (!data.items) throw new Error("La lista está vacía.");
                    
                    playlistTracks = procesarCanciones(data.items);
                    
                    if(playlistTracks.length > 0) {
                        logDebug(`¡Éxito! ${playlistTracks.length} canciones cargadas.`, "success");
                        btnPlay.style.display = 'flex';
                        controlPanel.style.display = 'flex';
                        setupPanel.style.display = 'flex';
                        statusText.innerHTML = `Conectado a:<br><strong>${playlistName}</strong><br><span style="font-size:1rem; opacity:0.7;">(${playlistTracks.length} canciones listas)</span>`;
                    } else {
                        throw new Error("No hay canciones válidas en la lista.");
                    }
                })
                .catch(error => {
                    logDebug(`Error Crítico: ${error.message}`, "error");
                    
                    if (error.message.includes("TOKEN_CADUCADO")) {
                        logDebug("Token expirado. Forzando cierre...", "warn");
                        statusText.innerText = "Token Caducado";
                    } else {
                        // Plan B
                        logDebug("Activando Plan B: Tus 'Me Gusta'", "warn");
                        statusText.innerHTML = `Bloqueo de API detectado<br><span style="font-size:1rem">Cargando tus Me Gusta...</span>`;
                        
                        fetch(`https://api.spotify.com/v1/me/tracks?limit=50`, {
                            headers: { 'Authorization': `Bearer ${accessToken}` }
                        })
                        .then(res => res.json())
                        .then(data => {
                            playlistTracks = procesarCanciones(data.items || []);
                            if(playlistTracks.length > 0) {
                                btnPlay.style.display = 'flex';
                                statusText.innerHTML = `Plan B Activado:<br><strong>Tus Me Gusta</strong><br><span style="font-size:1rem; opacity:0.7;">(Respaldo automático)</span>`;
                            }
                        });
                    }
                    setupPanel.style.display = 'flex';
                    controlPanel.style.display = 'flex';
                });
            }

            btnLoadCustom.addEventListener('click', () => {
                const rawInput = inputPlaylist.value.trim();
                if(!rawInput) return;
                const playlistId = extractPlaylistId(rawInput);
                localStorage.setItem('adibeat_custom_playlist', playlistId);
                cargarPlaylist(playlistId);
            });

            function iniciarApp() {
                if (accessToken) {
                    const savedPlaylist = localStorage.getItem('adibeat_custom_playlist');
                    if (savedPlaylist) {
                        cargarPlaylist(savedPlaylist);
                    } else {
                        // Carga la lista correspondiente del arreglo PLAYLISTS
                        logDebug(`Iniciando con Lista en Memoria: ${currentPlaylistIndex + 1}/${PLAYLISTS.length}`);
                        cargarPlaylist(PLAYLISTS[currentPlaylistIndex]);
                    }
                } else {
                    statusText.innerText = "Bienvenido a AdiBeat";
                    btnLogin.style.display = 'block';
                    
                    btnLogin.addEventListener('click', async () => {
                        const codeVerifier = generateRandomString(64);
                        window.localStorage.setItem('code_verifier', codeVerifier);
                        const hashed = await sha256(codeVerifier);
                        const codeChallenge = base64encode(hashed);

                        const authUrl = new URL("https://accounts.spotify.com/authorize");
                        authUrl.search = new URLSearchParams({
                            client_id: CLIENT_ID,
                            response_type: 'code',
                            redirect_uri: REDIRECT_URI,
                            scope: SCOPES,
                            code_challenge_method: 'S256',
                            code_challenge: codeChallenge,
                            show_dialog: 'true'
                        }).toString();
                        
                        window.location.href = authUrl.toString();
                    });
                }
            }

            // --- LÓGICA DE JUEGO (REPRODUCCIÓN Y METADATOS) ---
            btnPlay.addEventListener('click', () => {
                if(playlistTracks.length === 0) return;
                clearTimeout(temporizador);
                trackInfoDiv.style.display = "none";

                const randomIndex = Math.floor(Math.random() * playlistTracks.length);
                const currentTrack = playlistTracks[randomIndex];
                
                logDebug(`Sintonizando: ${currentTrack.name}`);
                playText.innerText = "SINTONIZANDO...";
                
                fetch('https://api.spotify.com/v1/me/player/play', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ "uris": [currentTrack.uri] })
                })
                .then(async response => {
                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(`HTTP ${response.status}: ${err.error?.message || 'Error de Playback'}`);
                    }
                    
                    playText.innerText = "¡ADIVINA!";
                    timerText.style.display = "block";
                    btnPlay.style.backgroundColor = "#673AB7"; 
                    btnPlay.style.borderColor = "#673AB7";
                    
                    let tiempo = 15;
                    timerText.innerText = `${tiempo}s`;
                    const intervalo = setInterval(() => {
                        tiempo--;
                        timerText.innerText = `${tiempo}s`;
                        if(tiempo <= 0) clearInterval(intervalo);
                    }, 1000);

                    temporizador = setTimeout(() => {
                        logDebug("Revelando datos de la canción...");
                        fetch('https://api.spotify.com/v1/me/player/pause', {
                            method: 'PUT',
                            headers: { 'Authorization': `Bearer ${accessToken}` }
                        }).then(() => {
                            playText.innerText = "▶ SIGUIENTE";
                            timerText.style.display = "none";
                            btnPlay.style.backgroundColor = "#ff4646";
                            btnPlay.style.borderColor = "#ff4646";
                            
                            // LLENAMOS Y MOSTRAMOS LOS METADATOS
                            trackNameEl.innerText = currentTrack.name;
                            trackArtistEl.innerText = currentTrack.artist;
                            trackAlbumEl.innerText = `${currentTrack.album} (${currentTrack.year})`;
                            trackInfoDiv.style.display = "block";
                        });
                    }, 15000); 
                })
                .catch(error => {
                    logDebug(`Playback Falló: ${error.message}`, "error");
                    playText.innerText = "ERROR";
                    statusText.innerHTML = "Abre Spotify en tu<br>celular o TV primero";
                });
            });
        });
    </script>
</body>
</html>
